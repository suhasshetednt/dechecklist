<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DE Delivery Compliance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3f9; --panel:#fff; --panel2:#f5f8fc; --line:#dde4ee; --border2:#c8d4e2; --accent-dim:rgba(2,132,199,.10);
    --txt:#0f2137; --muted:#4a6080; --faint:#8ba3bc;
    --accent:#0284c7; --accent2:#0ea5e9; --B:#059669; --S:#2563eb; --E:#7c3aed;
    --success:#059669; --warning:#d97706; --danger:#dc2626;
    --shadow:0 10px 30px rgba(15,33,55,.08); --r:14px;
  }
  .dark{
    --bg:#0b1220; --panel:#131c2e; --panel2:#172238; --line:#243049; --border2:#2c3a52; --accent-dim:rgba(56,189,248,.12);
    --txt:#e6edf7; --muted:#9fb0c9; --faint:#64748b; --accent:#38bdf8; --accent2:#0ea5e9;
    --B:#34d399; --S:#60a5fa; --E:#c084fc; --shadow:0 14px 40px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--txt);font:15px/1.55 'IBM Plex Sans',system-ui,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(900px 520px at 100% -12%,var(--accent-dim),transparent 60%),radial-gradient(700px 460px at -5% 0%,var(--accent-dim),transparent 55%),var(--bg);
    background-attachment:fixed;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  h1,h2,h3{font-family:'Big Shoulders Display',system-ui,sans-serif;margin:0}
  header.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:11px 22px;
    background:color-mix(in srgb,var(--panel) 88%,transparent);backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line)}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#7c3aed);display:grid;place-items:center;color:#fff;font-weight:800}
  .brand b{font-family:'Big Shoulders Display';font-size:18px;letter-spacing:.4px}
  .brand div{font-size:11px;color:var(--muted)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px}
  .row{display:flex;gap:16px;flex-wrap:wrap}.spacer{flex:1}.mt{margin-top:14px}.mb{margin-bottom:10px}
  .muted{color:var(--muted)}.small{font-size:12px}
  .btn{cursor:pointer;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:8px;padding:8px 14px;font:inherit;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  .btn.primary:hover{filter:brightness(1.07);color:#fff}
  .btn.success{background:var(--success);color:#fff;border-color:transparent}
  .btn.sm{padding:5px 10px;font-size:12px}.icon{width:34px;justify-content:center;padding:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .glass{background:color-mix(in srgb,var(--panel) 80%,transparent);backdrop-filter:blur(12px) saturate(140%)}
  .pad{padding:18px}.grid{display:grid;gap:16px}
  .stat{padding:15px;display:flex;justify-content:space-between;align-items:flex-start}
  .stat .v{font-family:'Big Shoulders Display';font-size:27px;font-weight:800;margin-top:3px}
  .stat .l{font-size:12px;color:var(--muted)} .stat .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--accent-dim);color:var(--accent)}
  .badge{display:inline-flex;align-items:center;gap:4px;border:1px solid;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
  .badge.b{color:var(--accent);border-color:transparent;background:var(--accent-dim)}
  .badge.muted{color:var(--muted);border-color:var(--line);background:var(--panel2)}
  .badge.B{color:var(--B);border-color:color-mix(in srgb,var(--B) 45%,transparent);background:color-mix(in srgb,var(--B) 10%,transparent)}
  .badge.S{color:var(--S);border-color:color-mix(in srgb,var(--S) 45%,transparent);background:color-mix(in srgb,var(--S) 10%,transparent)}
  .badge.E{color:var(--E);border-color:color-mix(in srgb,var(--E) 45%,transparent);background:color-mix(in srgb,var(--E) 10%,transparent)}
  .badge.ok{color:var(--success);border-color:color-mix(in srgb,var(--success) 45%,transparent);background:color-mix(in srgb,var(--success) 10%,transparent)}
  .badge.warn{color:var(--warning);border-color:color-mix(in srgb,var(--warning) 45%,transparent);background:color-mix(in srgb,var(--warning) 10%,transparent)}
  .track{height:8px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.4s}
  input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;color:var(--txt);padding:8px 11px;font:inherit;font-size:14px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);background:var(--panel)}
  label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
  textarea{min-height:70px;resize:vertical}
  .chip{cursor:pointer;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--accent);color:var(--accent)} .chip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  /* compliance board */
  .board{width:100%;border-collapse:collapse}
  .board th,.board td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  .board th{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .board tbody tr{cursor:pointer} .board tbody tr:hover td{background:var(--panel2)}
  .board th.c,.board td.c{text-align:center}
  .dot{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:7px;font-size:12px;font-weight:800}
  .dot.done{background:color-mix(in srgb,var(--success) 16%,transparent);color:var(--success)}
  .dot.prog{background:color-mix(in srgb,var(--warning) 16%,transparent);color:var(--warning)}
  .dot.none{background:var(--panel2);color:var(--faint)} .dot.na{background:var(--panel2);color:var(--muted)}
  .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:inline-grid;place-items:center;font-size:11px;font-weight:700;margin-right:7px;vertical-align:middle}
  .tkey{font-family:'IBM Plex Mono';font-weight:600;color:var(--accent)}
  /* stepper + items */
  .step{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;transition:.12s;width:100%;text-align:left;border:0;background:transparent;color:var(--txt)}
  .step:hover{background:var(--panel2)} .step.active{background:var(--accent-dim);color:var(--accent)}
  .step .n{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-weight:800;font-size:12px;border:1px solid var(--border2);flex:0 0 auto}
  .step .n.done{background:var(--success);color:#fff;border-color:transparent}.step .n.cur{background:var(--accent);color:#fff;border-color:transparent}.step .n.na{background:var(--panel2);color:var(--muted)}
  .group{border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-top:12px}
  .ghead{display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(90deg,var(--accent-dim),transparent)}
  .ghead h3{font-size:15px;letter-spacing:.5px;text-transform:uppercase}.ghead .bar{width:4px;height:18px;border-radius:3px;background:var(--accent)}
  .item{display:flex;gap:12px;padding:12px 14px;border-top:1px solid var(--line)}.item:hover{background:var(--panel2)}
  .item input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .item .t{font-weight:600}.item.done .t{text-decoration:line-through;color:var(--muted)}
  .item .w{color:var(--muted);font-size:13px;margin-top:3px}
  .item .v{margin-top:6px;font-size:12px;background:var(--accent-dim);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);border-left:3px solid var(--accent);border-radius:8px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;overflow-x:auto}
  .item .v b{font-family:'IBM Plex Sans';color:var(--accent);margin-right:6px}
  .nabar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:11px 14px;border:1px dashed var(--border2);border-radius:11px;background:var(--panel2);margin-top:12px}
  .miniseg{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-left:auto}
  .miniseg button{border:0;background:var(--panel);color:var(--muted);padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}
  .miniseg button.on{background:var(--accent);color:#fff}.miniseg button.on.na{background:var(--warning)}
  .ev{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:8px}
  .ev a{color:var(--accent);cursor:pointer}
  .drop{margin-top:10px;border:2px dashed var(--border2);border-radius:11px;padding:18px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;font-size:13px}
  .drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
  .drop b{color:var(--accent)}
  .cmt{border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:8px;font-size:14px}.cmt .meta{font-size:11px;color:var(--muted);margin-bottom:4px}
  .adv{display:flex;flex-wrap:wrap;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .ring-wrap{position:relative;display:grid;place-items:center}.ring-wrap span{position:absolute;font-weight:800;font-size:14px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;padding:10px 18px;border-radius:10px;transition:.3s;z-index:80;pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hint{color:var(--muted);text-align:center;padding:34px;font-size:13px}
  .modal{position:fixed;inset:0;background:rgba(15,33,55,.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:90}
  .modal.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:800px;width:100%;max-height:86vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .sheet .sh{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);font-family:'Big Shoulders Display';font-weight:700}
  .sheet textarea{flex:1;border:0;background:var(--panel2);color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:14px;resize:none;min-height:52vh}
  .sheet .sf{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--line)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
  @media(max-width:880px){.work{grid-template-columns:1fr!important}.hidesm{display:none}}
</style>
</head>
<body>
<header class="top">
  <div class="logo">✓</div>
  <div class="brand"><b>DE Delivery Compliance</b><div>Is every ticket following the standard? — for Tech Leads &amp; Management</div></div>
  <div class="spacer"></div>
  <a class="btn" href="#/">Board</a>
  <a class="btn primary" href="#/new">+ New Ticket</a>
  <button class="btn icon" id="themeBtn" title="Theme">☾</button>
</header>
<div id="app"></div>
<div class="modal" id="reportModal"><div class="sheet"><div class="sh"><span id="reportTitle">Compliance report</span><button class="btn sm" onclick="closeReport()">✕ Close</button></div><textarea id="reportText" readonly spellcheck="false"></textarea><div class="sf"><button class="btn primary" onclick="copyReport()">📋 Copy to clipboard</button><span class="small muted" style="margin-left:auto">Markdown · JIRA Cloud auto-converts on paste</span></div></div></div>
<div class="toast" id="toast"></div>

<script>
/* =================== PHASES =================== */
const SCOPE=[["ETL","ETL / ELT"],["SQL","SQL / VDS"]];
const MLBL={B:"Basic",S:"Standard",E:"Enterprise"};
const PHASES=[
 {key:"standards",n:0,name:"Engineering Standards",sub:"FLANG standards + environment readiness — set up before any development.",groups:[
   {title:"Table & Naming Standards (FLANG)",items:[
     {t:"Table/dataset names: lowercase snake_case, no spaces/special chars",w:"Consistency & portability.",v:"names match ^[a-z0-9_]+$",m:"B"},
     {t:"Layer/zone prefix applied (src_ / stg_ / dim_ / fact_)",w:"Self-describing.",v:"prefix correct for the layer",m:"S"},
     {t:"No reserved keywords as names (value, date, type)",w:"Calcite/DB rejects.",v:"name not reserved",m:"B"},
     {t:"Environment/zone in the path, not the name",w:"Same name promotes DEV→PROD.",v:"no env suffix",m:"S"}]},
   {title:"Column & Data-Type Standards (FLANG)",items:[
     {t:"Columns snake_case; suffixes _id / _key / _date / _ts; bool is_/has_",w:"Type obvious from name.",v:"suffixes applied",m:"B"},
     {t:"Money DECIMAL(p,s) (never FLOAT); timestamps UTC",w:"Floats lose pennies; TZ bugs.",v:"amount=DECIMAL; UTC",m:"B"},
     {t:"Consistent precision/scale; standard boolean representation",w:"Avoids mismatches.",v:"same DECIMAL across measures",m:"S"},
     {t:"Reserved-word columns aliased (t.\"value\" AS metric_value)",w:"Prevents VDS-save failures.",v:"aliased",m:"B"}]},
   {title:"Git, Documentation & Security Standards",items:[
     {t:"Branch feature/<KEY>-desc; commit carries ticket key",w:"Traceability.",v:"pattern followed",m:"B"},
     {t:"Dataset has description, owner, steward, classification",w:"Governable, discoverable.",v:"metadata present",m:"B"},
     {t:"No secrets in code; least-privilege access",w:"Security.",v:"secret scan; RBAC",m:"B"}]},
   {title:"Environment Readiness & Access",items:[
     {t:"Git access provisioned",w:"Can't build without it.",v:"repo access confirmed",m:"B"},
     {t:"Source & target DB access provisioned",w:"Build & test.",v:"connections verified",m:"B"},
     {t:"Data Lake / pipeline access provisioned",w:"Storage & deploy.",v:"access confirmed",m:"S"}]}]},
 {key:"requirement",n:1,name:"Requirement & Source/Target",sub:"Understand the requirement and analyse sources & targets — before development.",groups:[
   {title:"Requirement Understanding",items:[
     {t:"Business requirement & objective documented",w:"Wrong thing = costliest defect.",v:"requirement doc linked",m:"B"},
     {t:"Acceptance criteria defined & agreed with requester",w:"Defines 'done'.",v:"AC on ticket; confirmed",m:"B"},
     {t:"Scope & out-of-scope stated; assumptions logged",w:"Prevents scope creep.",v:"in the doc",m:"S"},
     {t:"Business rules captured",w:"Logic to build & test.",v:"rules documented",m:"B"}]},
   {title:"Source & Target Analysis",items:[
     {t:"Source systems identified (system, schema, tables, owner)",w:"Completeness needs every source.",v:"source inventory",m:"B"},
     {t:"Source data profiled (counts, keys, nulls, ranges, samples)",w:"Real-data surprises break designs.",v:"profiling attached",m:"S"},
     {t:"Target identified (system, layer, model, grain, SCD)",w:"Where & how output lands.",v:"target design",m:"B"},
     {t:"Incremental strategy decided (full/CDC/watermark) + key",w:"No missed/dup data.",v:"strategy + key",m:"S"},
     {t:"Dependencies & downstream impact analysed",w:"Changes cascade.",v:"impact list",m:"S"}]}]},
 {key:"techdoc",n:2,name:"Technical Documentation",sub:"Create the design & documentation set in the FLANG standard format.",groups:[
   {title:"Mapping & Dictionary (FLANG format)",items:[
     {t:"Source-to-target mapping (STTM) — field level, standard template",w:"Build-and-test contract.",v:"STTM linked",m:"B"},
     {t:"Data dictionary — tables & columns in FLANG standard format",w:"Self-describing, governable.",v:"dictionary per target column",m:"B"},
     {t:"Transformation rules documented",w:"Unambiguous logic.",v:"rules in design",m:"B"}]},
   {title:"Design & Diagrams",items:[
     {t:"Technical design document",w:"Single source of truth.",v:"design doc linked",m:"B"},
     {t:"Architecture / data-flow diagram",w:"Shared mental model.",v:"diagram attached",m:"S"},
     {t:"ER / data-model diagram",w:"Clarifies keys & grain.",v:"ERD attached",m:"S"},
     {t:"Performance, logging, restart & error-handling design",w:"Operability & resilience.",v:"documented",m:"S"}]},
   {title:"Storage & Approval",items:[
     {t:"Naming/standards (Phase 0) applied throughout",w:"Consistency.",v:"names/types match standard",m:"B"},
     {t:"Docs versioned, stored in agreed location & linked to ticket",w:"Findable by the team.",v:"links on ticket",m:"B"}]}]},
 {key:"ready",n:3,name:"Definition of Ready",approval:true,sub:"Package phases 0–2 and submit to the Technical Lead for sign-off to start development.",groups:[
   {title:"Ready to submit to Lead",items:[
     {t:"Requirement doc, STTM & data dictionary attached",w:"Lead reviews artifacts.",v:"all linked",m:"B"},
     {t:"Diagrams (architecture + ER) attached",w:"Design reviewable.",v:"diagrams linked",m:"S"},
     {t:"Standards confirmed applied; open questions listed",w:"Focuses review.",v:"self-check + list",m:"B"},
     {t:"Development scope declared (ETL/ELT, SQL/VDS) with rationale",w:"Sets which build phases apply.",v:"scope on ticket",m:"B"},
     {t:"Ticket moved to In Review / assigned to Technical Lead",w:"Triggers the review.",v:"status + assignee",m:"B"}]},
   {title:"Lead Sign-off",items:[
     {t:"Technical Lead decision recorded (Ready / Ready w conditions / Not Ready)",w:"The gate that starts the build.",v:"decision + signature captured",m:"B"}]}]},
 {key:"review-loop",n:4,name:"Review Feedback & Iterate",sub:"Act on Lead feedback, correct phases 1–2, re-submit. Loop until approved.",groups:[
   {title:"Feedback Loop",items:[
     {t:"Lead/architect feedback captured on the ticket",w:"Actionable & auditable.",v:"comments present",m:"B"},
     {t:"Each feedback item actioned or answered with rationale",w:"Nothing dropped.",v:"each point resolved",m:"B"},
     {t:"Phases 1–2 corrected per feedback (requirement / mapping / docs)",w:"Fix the source of truth.",v:"docs updated & re-linked",m:"B"},
     {t:"Re-submitted for re-review where changes are material",w:"Closes the loop (back to Phase 3).",v:"re-review requested",m:"S"},
     {t:"Final design APPROVED by the Lead → proceed to development",w:"Starts the build.",v:"approval recorded",m:"B"}]}]},
 {key:"dev-etl",n:5,name:"Development — ETL / ELT",scope:"ETL",naAllowed:true,sub:"Build & unit-test the pipeline. If data already lands in the lake, mark N/A with a reason.",groups:[
   {title:"ETL / ELT Build",items:[
     {t:"Workflow built per design; parameters externalized (no hardcoding)",w:"Promotable, maintainable.",v:"context/config used",m:"B"},
     {t:"Scheduling, dependencies, logging, audit & restartability",w:"Operable & resilient.",v:"schedule + logs + resume tested",m:"S"},
     {t:"Incremental / CDC logic implemented & validated",w:"No missed/duplicated rows.",v:"delta + boundary tested",m:"S"},
     {t:"Performance tuned (bulk load, parallelism)",w:"Meets SLA.",v:"timed on real volume",m:"S"}]},
   {title:"Unit Testing (ETL / ELT)",items:[
     {t:"Source → target reconciliation: source = loaded + rejected + filtered",w:"Completeness proof.",v:"equation holds; evidence attached",m:"B"},
     {t:"Control totals / checksum match",w:"Values, not just counts.",v:"SUM/hash reconciles",m:"S"},
     {t:"Positive / negative / boundary / null cases pass",w:"Bugs hide at edges.",v:"cases written & passing",m:"B"},
     {t:"Idempotency — re-run produces no duplicates",w:"Re-runs are normal.",v:"run twice; dup-key=0",m:"B"},
     {t:"Reject / exception handling validated",w:"Errors routed, not lost.",v:"bad rows in reject store",m:"S"},
     {t:"Test evidence uploaded (counts, results, screenshots)",w:"Proof, not claims.",v:"evidence attached below",m:"B"}]}]},
 {key:"dev-sql",n:6,name:"Development — SQL / VDS",scope:"SQL",naAllowed:true,sub:"Build, optimize & unit-test the query, then publish the VDS. Mark N/A if no query/VDS work.",groups:[
   {title:"SQL Build & Optimization",items:[
     {t:"No SELECT *; CTEs; tables aliased; sargable predicates",w:"Readable, stable, fast.",v:"review SELECT list",m:"B"},
     {t:"Execution plan reviewed — no full scans; indexes/partitions used",w:"The plan is the truth.",v:"EXPLAIN / profile reviewed",m:"B"},
     {t:"Business rules implemented; NULL handling; exception handling",w:"Correctness & resilience.",v:"rules tested",m:"S"}]},
   {title:"VDS Creation (Dremio)",items:[
     {t:"Query saved as a VDS in the correct space; validates (reserved aliased)",w:"The VDS is the deliverable.",v:"VDS at path; validates",m:"B"},
     {t:"Pushdown & partition pruning verified in the profile",w:"Avoid full scans.",v:"profile shows pushdown + pruning",m:"S"},
     {t:"Reflection created/considered; acceleration CHOSEN; metadata fresh",w:"Biggest speed lever.",v:"profile Reflections = CHOSEN",m:"E"}]},
   {title:"Unit Testing (SQL / VDS)",items:[
     {t:"Row count vs source; grain & uniqueness (dup-key = 0)",w:"Dropped/dup rows skew metrics.",v:"GROUP BY key HAVING COUNT(*)>1 = 0",m:"B"},
     {t:"Aggregation / control-total reconciliation",w:"Values correct.",v:"SUM reconciles to source",m:"S"},
     {t:"Business-rule assertions = 0 violations; edge & null cases",w:"Valid ≠ correct.",v:"assertion queries = 0 rows",m:"B"},
     {t:"Test evidence uploaded (query results, profile, counts)",w:"Proof, not claims.",v:"evidence attached below",m:"B"}]}]},
 {key:"done",n:7,name:"Definition of Done",approval:true,sub:"Final sign-off to the Technical Lead — development, unit testing and documentation complete.",groups:[
   {title:"Done Checklist (proves the work was done properly)",items:[
     {t:"Development complete for all selected scope",w:"All scope built.",v:"phases 5/6 complete or N/A",m:"B"},
     {t:"Unit testing passed with evidence attached",w:"Proven correct.",v:"reconciliation + test evidence present",m:"B"},
     {t:"Documentation updated to final state (STTM, dictionary, diagrams)",w:"Docs match what shipped.",v:"docs current & linked",m:"B"},
     {t:"No critical / high defects open",w:"Quality bar.",v:"defect list clean",m:"B"},
     {t:"Deployment readiness: promotion path + rollback plan",w:"Smooth, reversible release.",v:"DEV→TEST→UAT→PROD + rollback",m:"S"},

function uid(){return Math.random().toString(36).slice(2,9)}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function findT(id){return DB.tickets.find(t=>t.id===id)}
function ik(pk,gi,ii){return pk+"."+gi+"."+ii}
function groupApplies(){return true}
function applicableKeys(phase){const k=[];phase.groups.forEach((g,gi)=>g.items.forEach((_,ii)=>k.push(ik(phase.key,gi,ii))));return k}
function ps(t,key){t.phases=t.phases||{};return t.phases[key]||(t.phases[key]={status:"NOT_STARTED",approval:"PENDING"})}
function phasePct(t,phase){const st=ps(t,phase.key);if(st.status==="NA"||st.status==="COMPLETED")return 100;const ks=applicableKeys(phase);const d=ks.filter(k=>t.checks[k]).length;return ks.length?Math.round(d/ks.length*100):0}
function overall(t){let to=0,d=0;PHASES.forEach(ph=>{const st=ps(t,ph.key);if(st.status==="NA")return;const ks=applicableKeys(ph);to+=ks.length;d+=ks.filter(k=>t.checks[k]).length});return to?Math.round(d/to*100):0}
function act(t,msg){t.activity=t.activity||[];t.activity.unshift({msg,at:Date.now(),by:CURRENT});t.activity=t.activity.slice(0,40)}
function ago(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+"s ago";const m=Math.floor(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago"}
function initials(n){return n.split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase()}

/* compliance status of a ticket per area: done | prog | none | na */
function areaStatus(t,phaseKey){const ph=PHASES.find(p=>p.key===phaseKey);const st=ps(t,phaseKey);
  if(st.status==="NA")return "na";if(st.status==="COMPLETED")return "done";if(ph&&ph.approval&&st.approval==="APPROVED")return "done";
  const p=phasePct(t,ph);return p>0?"prog":"none"}
function devStatus(t){const sel=t.devTypes;const phs=[["ETL","dev-etl"],["SQL","dev-sql"]].filter(x=>sel.includes(x[0]));
  if(!phs.length)return "na";const sts=phs.map(x=>areaStatus(t,x[1]));if(sts.every(s=>s==="done"||s==="na"))return "done";if(sts.some(s=>s==="prog"||s==="done"))return "prog";return "none"}
function unitStatus(t){const sel=t.devTypes;const phs=[["ETL","dev-etl"],["SQL","dev-sql"]].filter(x=>sel.includes(x[0]));if(!phs.length)return "na";
  let total=0,done=0,naAll=true;phs.forEach(x=>{const ph=PHASES.find(p=>p.key===x[1]);const st=ps(t,ph.key);if(st.status==="NA")return;naAll=false;
    ph.groups.forEach((g,gi)=>{if(!/unit testing/i.test(g.title))return;g.items.forEach((_,ii)=>{total++;if(t.checks[ik(ph.key,gi,ii)])done++})})});
  if(naAll)return "na";if(total&&done>=total)return "done";return done>0?"prog":"none"}

let activeIdx=0;
function renderTicket(id){
  const t=findT(id);if(!t){location.hash="#/";return}
  if(location.hash.indexOf("__keep")<0)activeIdx=t.currentPhase;
  const phase=PHASES[activeIdx];const st=ps(t,phase.key);
  const reqKeys=applicableKeys(phase);const done=reqKeys.filter(k=>t.checks[k]).length;
  const isNA=st.status==="NA";const ppct=isNA?100:(reqKeys.length?Math.round(done/reqKeys.length*100):100);
  const canAdv=isNA||done>=reqKeys.length;

  const steps=PHASES.map((ph,i)=>{const s=ps(t,ph.key);const cls=s.status==="COMPLETED"?"done":s.status==="NA"?"na":(i===t.currentPhase?"cur":"");const mark=s.status==="COMPLETED"?"✓":s.status==="NA"?"∅":ph.n;
    return '<button class="step'+(i===activeIdx?" active":"")+'" onclick="goPhase(\''+id+'\','+i+')"><span class="n '+cls+'">'+mark+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ph.name)+'</span></button>'}).join("");

  let bd="";
  if(phase.naAllowed){bd+='<div class="nabar"><span style="font-weight:600">Is this phase applicable to this ticket?</span><div class="miniseg"><button class="'+(!isNA?"on":"")+'" onclick="setNA(\''+id+'\',false)">Applicable</button><button class="'+(isNA?"on na":"")+'" onclick="askNA(\''+id+'\')">N/A + comment</button></div></div>'}
  if(isNA){bd+='<div class="card pad mt" style="border-style:dashed"><b>Marked N/A</b><div class="muted mt" style="margin-top:6px">'+esc(st.naReason||"")+'</div></div>'}
  else{phase.groups.forEach((g,gi)=>{bd+='<div class="group"><div class="ghead"><span class="bar"></span><h3>'+esc(g.title)+'</h3></div>';
    g.items.forEach((it,ii)=>{const k=ik(phase.key,gi,ii);const ck=!!t.checks[k];
      bd+='<label class="item'+(ck?" done":"")+'"><input type="checkbox" '+(ck?"checked":"")+' onchange="toggleItem(\''+id+'\',\''+k+'\',\''+phase.key+'\',this.checked)"><div style="flex:1;min-width:0"><div style="display:flex;gap:8px;align-items:flex-start"><span class="t" style="flex:1">'+esc(it.t)+'</span><span class="badge '+it.m+'">'+MLBL[it.m]+'</span></div>'+(it.w?'<div class="w">'+esc(it.w)+'</div>':'')+(it.v?'<div class="v"><b>verify</b>'+esc(it.v)+'</div>':'')+'</div></label>'});
    bd+='</div>'})}
  let adv='<div class="adv">';
  if(phase.approval){adv+='<span style="font-weight:600">Lead sign-off:</span><button class="btn success sm" '+(canAdv?"":"disabled")+' onclick="advance(\''+id+'\',\'APPROVED\')">✓ Approve &amp; Continue</button><button class="btn sm" '+(canAdv?"":"disabled")+' onclick="advance(\''+id+'\',\'READY_WITH_CONDITIONS\')">Ready w/ conditions</button><button class="btn sm" onclick="advance(\''+id+'\',\'NOT_READY\')">Not Ready</button>'}
  else{adv+='<button class="btn primary" '+(canAdv?"":"disabled")+' onclick="advance(\''+id+'\')">'+(phase.n===7?"Complete & Close Ticket":"Complete Phase "+phase.n+" → Next")+'</button>'}
  if(!canAdv)adv+='<span class="small muted">Verify all items (or mark N/A) to continue.</span>';
  adv+='</div>';

  const evs=(t.evidence||[]).filter(e=>e.phaseKey===phase.key);
  const evH=evs.map(e=>{
    if(e.kind==="file")return '<div class="ev">📄 <span style="flex:1"><a onclick="openEv(\''+e.fid+'\',\''+esc(e.name)+'\')">'+esc(e.name)+'</a> <span class="small muted">'+fmtSize(e.size)+'</span></span><span class="small muted">'+ago(e.at)+'</span></div>';
    return '<a class="ev" href="'+esc(e.url)+'" target="_blank">🔗 <span style="flex:1">'+esc(e.name)+'</span><span class="small muted">'+ago(e.at)+'</span></a>';
  }).join("");
  const cms=(t.comments||[]).filter(c=>c.phaseKey===phase.key);
  const cmH=cms.map(c=>'<div class="cmt"><div class="meta"><b>'+esc(c.by)+'</b> · '+ago(c.at)+'</div>'+esc(c.body)+'</div>').join("");

  $("app").innerHTML='<div class="wrap"><a class="small muted" href="#/">← Board</a>'

      +'<div style="flex:1;min-width:0"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="tkey" style="font-size:18px">'+esc(t.key)+'</span><h1 style="font-size:22px">'+esc(t.title)+'</h1></div>'
      +'<div class="small muted mt" style="margin-top:4px"><span class="av">'+initials(t.assignee)+'</span>'+esc(t.assignee)+' · '+esc(t.source||"—")+' → '+esc(t.target||"—")+'</div>'
      +'<div class="mt" style="margin-top:7px;display:flex;gap:6px;flex-wrap:wrap">'+(t.devTypes.map(d=>'<span class="badge b">'+(d==="ETL"?"ETL / ELT":"SQL / VDS")+'</span>').join(""))+'</div></div>'

        +(isNA?"":'<div class="mt" style="display:flex;gap:10px;align-items:center"><div class="track" style="flex:1"><div class="fill" style="width:'+ppct+'%"></div></div><span class="small muted">'+done+'/'+reqKeys.length+'</span></div>')+bd+adv+'</div>'

        +'<div class="drop" ondragover="event.preventDefault();this.classList.add(\'over\')" ondragleave="this.classList.remove(\'over\')" ondrop="dropFiles(event,\''+id+'\',\''+phase.key+'\')" onclick="document.getElementById(\'fi\').click()">⬆ Drag &amp; drop files here, or <b>click to browse</b><div class="small muted" style="margin-top:3px">screenshots, CSVs, PDFs… stored in your browser (max 15&nbsp;MB each)</div></div>'

      +'</div></div></div>';
}
function goPhase(id,i){activeIdx=i;location.hash="#/t/"+id+"__keep";renderTicket(id)}
function toggleItem(id,k,pk,v){const t=findT(id);t.checks[k]=v;const st=ps(t,pk);if(st.status==="NOT_STARTED")st.status="IN_PROGRESS";save();renderTicket(id)}
function setNA(id,na){const t=findT(id);const ph=PHASES[activeIdx];const st=ps(t,ph.key);if(!na){st.status="IN_PROGRESS";st.naReason="";act(t,"Phase "+ph.n+" marked applicable")}save();renderTicket(id)}
function askNA(id){const r=prompt("Reason this phase is N/A (e.g., data already lands in the Data Lake; no ETL required):");if(r==null)return;if(!r.trim()){toast("A reason is required");return}const t=findT(id);const ph=PHASES[activeIdx];const st=ps(t,ph.key);st.status="NA";st.naReason=r.trim();act(t,"Phase "+ph.n+" marked N/A — "+r.trim());save();renderTicket(id)}
function advance(id,approval){const t=findT(id);const ph=PHASES[activeIdx];const st=ps(t,ph.key);const reqKeys=applicableKeys(ph);const done=reqKeys.filter(k=>t.checks[k]).length;
  if(st.status!=="NA"&&done<reqKeys.length){toast("Complete all items first");return}
  if(ph.approval&&!approval){toast("A sign-off decision is required");return}
  if(st.status!=="NA")st.status="COMPLETED";if(ph.approval){st.approval=approval;st.signedBy=CURRENT;st.signedAt=Date.now()}
  act(t,"Phase "+ph.n+" ("+ph.name+") completed"+(approval?" — "+approval:""));
  const next=PHASES[ph.n+1];
  if(next){ps(t,next.key);if(t.phases[next.key].status==="NOT_STARTED")t.phases[next.key].status="IN_PROGRESS";t.currentPhase=next.n;activeIdx=next.n;toast("Phase "+ph.n+" complete → Phase "+next.n)}
  else{t.completed=true;toast("Ticket complete 🎉")}
  save();location.hash="#/t/"+id;renderTicket(id);
}
function addEv(id,pk){const n=$("ev_name").value.trim(),u=$("ev_url").value.trim();if(!n||!u){toast("Name and link required");return}const t=findT(id);t.evidence.push({kind:"link",phaseKey:pk,name:n,url:u,at:Date.now(),by:CURRENT});act(t,"Evidence link added: "+n);save();renderTicket(id)}
/* ---- file uploads (drag & drop / browse) stored in IndexedDB ---- */
let _fdb;
function idb(){return new Promise((res,rej)=>{if(_fdb)return res(_fdb);const r=indexedDB.open("de-compliance-files",1);r.onupgradeneeded=()=>r.result.createObjectStore("files");r.onsuccess=()=>{_fdb=r.result;res(_fdb)};r.onerror=()=>rej(r.error)})}
function idbPut(k,blob){return idb().then(db=>new Promise((res,rej)=>{const tx=db.transaction("files","readwrite");tx.objectStore("files").put(blob,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)}))}
function idbGet(k){return idb().then(db=>new Promise((res,rej)=>{const tx=db.transaction("files","readonly");const rq=tx.objectStore("files").get(k);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)}))}
function fmtSize(n){if(n<1024)return n+" B";if(n<1048576)return (n/1024).toFixed(0)+" KB";return (n/1048576).toFixed(1)+" MB"}
async function handleFiles(list,id,pk){const t=findT(id);const files=[...list];let ok=0;
  for(const f of files){if(f.size>15*1048576){toast('"'+f.name+'" too large (>15MB)');continue}const fid=uid()+"_"+f.name;
    try{await idbPut(fid,f);t.evidence.push({kind:"file",fid,name:f.name,size:f.size,type:f.type,phaseKey:pk,at:Date.now(),by:CURRENT});act(t,"Evidence uploaded: "+f.name);ok++}catch(e){toast("Could not store "+f.name)}}
  if(ok){save();renderTicket(id);toast(ok+" file(s) attached")}}
function dropFiles(e,id,pk){e.preventDefault();handleFiles(e.dataTransfer.files,id,pk)}
function browseFiles(inp,id,pk){handleFiles(inp.files,id,pk)}
async function openEv(fid,name){try{const b=await idbGet(fid);if(!b){toast("File not found in this browser");return}const url=URL.createObjectURL(b);const a=document.createElement("a");a.href=url;if(b.type&&(b.type.indexOf("image/")===0||b.type==="application/pdf"||b.type.indexOf("text/")===0)){a.target="_blank"}else{a.download=name}document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),15000)}catch(e){toast("Could not open file")}}
function addCm(id,pk){const b=$("cm_body").value.trim();if(!b)return;const t=findT(id);t.comments.push({phaseKey:pk,body:b,at:Date.now(),by:CURRENT});act(t,"Added a comment");save();renderTicket(id)}
function buildReport(t){
  const scopes=t.devTypes.map(d=>d==="ETL"?"ETL/ELT":"SQL/VDS").join(", ")||"—";
  const L=["*Delivery Compliance Report — "+t.key+": "+t.title+"*",
    "Assignee: "+t.assignee+"  |  Scope: "+scopes+"  |  Overall completion: "+overall(t)+"%",
    "Generated "+new Date().toLocaleString()+" by "+CURRENT,
    "----",""];
  PHASES.forEach(ph=>{
    const st=ps(t,ph.key);const ks=applicableKeys(ph);const done=ks.filter(k=>t.checks[k]).length;
    let status;
    if(st.status==="NA")status="N/A";
    else if(st.status==="COMPLETED")status="DONE"+(ph.approval&&st.approval&&st.approval!=="PENDING"?" — "+st.approval.replace(/_/g," ")+(st.signedBy?" by "+st.signedBy:""):"");
    else if(ks.length&&done>=ks.length)status="READY ("+done+"/"+ks.length+")";
    else status=(done>0?"IN PROGRESS":"NOT STARTED")+" ("+done+"/"+ks.length+")";
    L.push("h3. Phase "+ph.n+" — "+ph.name+"  ["+status+"]");
    if(st.status==="NA"){L.push("_N/A — "+(st.naReason||"no reason given")+"_");}
    else{ph.groups.forEach((g,gi)=>{L.push("*"+g.title+"*");g.items.forEach((it,ii)=>{const c=t.checks[ik(ph.key,gi,ii)];L.push((c?"(/) ":"(x) ")+it.t);});});}
    const evs=(t.evidence||[]).filter(e=>e.phaseKey===ph.key);
    if(evs.length)L.push("_Evidence: "+evs.map(e=>e.name).join(", ")+"_");
    const cms=(t.comments||[]).filter(c=>c.phaseKey===ph.key);
    if(cms.length)L.push("_Comments ("+cms.length+"): "+cms.map(c=>c.by+": "+c.body).join("  |  ")+"_");
    L.push("");
  });
  return L.join("\n");
}
function copyJira(id){const t=findT(id);const txt=buildReport(t);$("reportText").value=txt;$("reportTitle").textContent="Compliance report — "+t.key;$("reportModal").classList.add("open");
  navigator.clipboard.writeText(txt).then(()=>toast("Full report copied to clipboard")).catch(()=>{});}
function copyReport(){const ta=$("reportText");navigator.clipboard.writeText(ta.value).then(()=>toast("Copied")).catch(()=>{ta.select();document.execCommand("copy");toast("Copied")});}
function closeReport(){$("reportModal").classList.remove("open")}

/* =================== EXPORT / IMPORT =================== */
function blobToDataURL(b){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(b)})}
function dataURLtoBlob(d){const p=d.split(",");const mime=(p[0].match(/:(.*?);/)||[])[1]||"application/octet-stream";const bin=atob(p[1]);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return new Blob([a],{type:mime})}
function download(name,text){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type:"application/json"}));a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),5000)}
async function gatherFiles(tickets){const files={};for(const t of tickets){for(const e of (t.evidence||[])){if(e.kind==="file"){try{const b=await idbGet(e.fid);if(b)files[e.fid]=await blobToDataURL(b)}catch(_){}}}}return files}
async function exportAll(){toast("Preparing export…");const files=await gatherFiles(DB.tickets);download("de-compliance-"+new Date().toISOString().slice(0,10)+".json",JSON.stringify({app:"de-compliance",version:1,exportedAt:Date.now(),by:CURRENT,tickets:DB.tickets,files},null,2));toast("Exported "+DB.tickets.length+" ticket(s)")}
async function exportTicket(id){const t=findT(id);toast("Preparing export…");const files=await gatherFiles([t]);download(t.key+"-status.json",JSON.stringify({app:"de-compliance",version:1,exportedAt:Date.now(),by:CURRENT,tickets:[t],files},null,2));toast("Exported "+t.key)}
async function importJSON(inp){const f=inp.files[0];if(!f){return}
  try{const data=JSON.parse(await f.text());
    if(!data||!Array.isArray(data.tickets)){toast("Not a valid export file");inp.value="";return}
    if(!confirm("Import "+data.tickets.length+" ticket(s) from "+(data.by||"unknown")+"?\\nTickets with the same ID will be overwritten; others are added.")){inp.value="";return}
    if(data.files){for(const fid in data.files){try{await idbPut(fid,dataURLtoBlob(data.files[fid]))}catch(_){}}}
    data.tickets.forEach(it=>{const i=DB.tickets.findIndex(x=>x.id===it.id);if(i>=0)DB.tickets[i]=it;else DB.tickets.push(it)});
    save();toast("Imported "+data.tickets.length+" ticket(s)");location.hash="#/";renderBoard();
  }catch(e){toast("Import failed: invalid file")}finally{inp.value=""}}

/* =================== THEME =================== */
function applyTheme(){const d=localStorage.getItem("portal-theme")==="dark";document.documentElement.classList.toggle("dark",d);$("themeBtn").textContent=d?"☀":"☾"}
$("themeBtn").onclick=()=>{const d=!document.documentElement.classList.contains("dark");localStorage.setItem("portal-theme",d?"dark":"light");applyTheme()};
$("reportModal").onclick=e=>{if(e.target.id==="reportModal")closeReport()};
applyTheme();route();
</script>
