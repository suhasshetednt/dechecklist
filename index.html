<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DE Governance Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3f9; --panel:#fff; --panel2:#f5f8fc; --line:#dde4ee; --border2:#c8d4e2; --accent-dim:rgba(2,132,199,.10);
    --txt:#0f2137; --muted:#4a6080; --faint:#8ba3bc;
    --accent:#0284c7; --accent2:#0ea5e9;
    --B:#059669; --S:#2563eb; --E:#7c3aed;
    --success:#059669; --warning:#d97706; --danger:#dc2626;
    --shadow:0 10px 30px rgba(15,33,55,.08); --r:14px;
  }
  .dark{
    --bg:#0b1220; --panel:#131c2e; --panel2:#172238; --line:#243049; --border2:#2c3a52; --accent-dim:rgba(56,189,248,.12);
    --txt:#e6edf7; --muted:#9fb0c9; --faint:#64748b;
    --accent:#38bdf8; --accent2:#0ea5e9; --B:#34d399; --S:#60a5fa; --E:#c084fc;
    --shadow:0 14px 40px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--txt);font:15px/1.55 'IBM Plex Sans',system-ui,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(900px 520px at 100% -12%,var(--accent-dim),transparent 60%),
      radial-gradient(700px 460px at -5% 0%,var(--accent-dim),transparent 55%),var(--bg);
    background-attachment:fixed;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  h1,h2,h3{font-family:'Big Shoulders Display',system-ui,sans-serif;margin:0}
  .mono{font-family:'IBM Plex Mono',monospace}
  /* layout */
  header.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:11px 22px;
    background:color-mix(in srgb,var(--panel) 88%,transparent);backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line)}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#7c3aed);display:grid;place-items:center;color:#fff;font-weight:800}
  .brand b{font-family:'Big Shoulders Display';font-size:18px;letter-spacing:.4px}
  .brand div{font-size:11px;color:var(--muted)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .spacer{flex:1}
  /* buttons */
  .btn{cursor:pointer;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:8px;
    padding:8px 14px;font:inherit;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  .btn.primary:hover{filter:brightness(1.07);color:#fff}
  .btn.success{background:var(--success);color:#fff;border-color:transparent}
  .btn.sm{padding:5px 10px;font-size:12px}
  .icon{width:34px;justify-content:center;padding:8px}
  /* cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .glass{background:color-mix(in srgb,var(--panel) 80%,transparent);backdrop-filter:blur(12px) saturate(140%)}
  .pad{padding:18px}
  .grid{display:grid;gap:16px}
  .stat{padding:16px;display:flex;justify-content:space-between;align-items:flex-start}
  .stat .v{font-family:'Big Shoulders Display';font-size:28px;font-weight:800;margin-top:3px}
  .stat .l{font-size:12px;color:var(--muted)}
  .stat .s{font-size:11px;color:var(--faint);margin-top:2px}
  .stat .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--accent-dim);color:var(--accent)}
  /* badges */
  .badge{display:inline-flex;align-items:center;gap:4px;border:1px solid;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
  .badge.b{color:var(--accent);border-color:transparent;background:var(--accent-dim)}
  .badge.muted{color:var(--muted);border-color:var(--line);background:var(--panel2)}
  .badge.B{color:var(--B);border-color:color-mix(in srgb,var(--B) 45%,transparent);background:color-mix(in srgb,var(--B) 10%,transparent)}
  .badge.S{color:var(--S);border-color:color-mix(in srgb,var(--S) 45%,transparent);background:color-mix(in srgb,var(--S) 10%,transparent)}
  .badge.E{color:var(--E);border-color:color-mix(in srgb,var(--E) 45%,transparent);background:color-mix(in srgb,var(--E) 10%,transparent)}
  .badge.ok{color:var(--success);border-color:color-mix(in srgb,var(--success) 45%,transparent);background:color-mix(in srgb,var(--success) 10%,transparent)}
  .badge.warn{color:var(--warning);border-color:color-mix(in srgb,var(--warning) 45%,transparent);background:color-mix(in srgb,var(--warning) 10%,transparent)}
  /* progress */
  .track{height:8px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.4s}
  /* inputs */
  input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;color:var(--txt);padding:8px 11px;font:inherit;font-size:14px}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);background:var(--panel)}
  label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
  textarea{min-height:70px;resize:vertical}
  /* chips */
  .chip{cursor:pointer;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  /* project card */
  .pcard{display:flex;align-items:center;gap:16px;padding:16px}
  .pcard .nm{font-family:'Big Shoulders Display';font-size:19px;font-weight:700}
  .pcard:hover{box-shadow:0 12px 32px rgba(15,33,55,.12)}
  /* stepper */
  .step{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;transition:.12s;width:100%;text-align:left;border:0;background:transparent;color:var(--txt)}
  .step:hover{background:var(--panel2)}
  .step.active{background:var(--accent-dim);color:var(--accent)}
  .step .n{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-weight:800;font-size:12px;border:1px solid var(--border2);flex:0 0 auto}
  .step .n.done{background:var(--success);color:#fff;border-color:transparent}
  .step .n.cur{background:var(--accent);color:#fff;border-color:transparent}
  .step .n.na{background:var(--panel2);color:var(--muted)}
  /* items */
  .group{border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-top:12px}
  .ghead{display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(90deg,var(--accent-dim),transparent)}
  .ghead h3{font-size:15px;letter-spacing:.5px;text-transform:uppercase}
  .ghead .bar{width:4px;height:18px;border-radius:3px;background:var(--accent)}
  .item{display:flex;gap:12px;padding:12px 14px;border-top:1px solid var(--line)}
  .item:hover{background:var(--panel2)}
  .item input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .item .t{font-weight:600}
  .item.done .t{text-decoration:line-through;color:var(--muted)}
  .item .w{color:var(--muted);font-size:13px;margin-top:3px}
  .item .v{margin-top:6px;font-size:12px;background:var(--accent-dim);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);
    border-left:3px solid var(--accent);border-radius:8px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;overflow-x:auto}
  .item .v b{font-family:'IBM Plex Sans';color:var(--accent);margin-right:6px}
  .nabar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:11px 14px;border:1px dashed var(--border2);border-radius:11px;background:var(--panel2);margin-top:12px}
  .miniseg{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-left:auto}
  .miniseg button{border:0;background:var(--panel);color:var(--muted);padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}
  .miniseg button.on{background:var(--accent);color:#fff}
  .miniseg button.on.na{background:var(--warning)}
  .ev{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:8px}
  .cmt{border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:8px;font-size:14px}
  .cmt .meta{font-size:11px;color:var(--muted);margin-bottom:4px}
  .adv{display:flex;flex-wrap:wrap;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  /* modal/toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;padding:10px 18px;border-radius:10px;transition:.3s;z-index:80;pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .ring-wrap{position:relative;display:grid;place-items:center}
  .ring-wrap span{position:absolute;font-weight:800;font-size:14px}
  .muted{color:var(--muted)} .small{font-size:12px} .mt{margin-top:14px} .mb{margin-bottom:10px}
  .hint{color:var(--muted);text-align:center;padding:34px;font-size:13px}
  @media(max-width:880px){.work{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<header class="top">
  <div class="logo">◆</div>
  <div class="brand"><b>DE Governance Portal</b><div>Phase-driven delivery &amp; unit testing</div></div>
  <div class="spacer"></div>
  <a class="btn" href="#/">Dashboard</a>
  <a class="btn primary" href="#/new">+ New Project</a>
  <button class="btn icon" id="themeBtn" title="Theme">☾</button>
</header>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* =================== GOVERNANCE CONTENT (10 phases) =================== */
const DEV_TYPES=[["ETL","ETL"],["ELT","ELT"],["SQL","SQL"],["VDS","VDS"],["PYTHON","Python"],["SPARK","Spark"],["DATABRICKS","Databricks"],["DATALAKE","Data Lake"],["API","APIs"],["STREAMING","Streaming"],["OTHER","Other"]];
const MLBL={B:"Basic",S:"Standard",E:"Enterprise"};
const PHASES=[
 {key:"standards",n:0,name:"Engineering Standards",sub:"FLANG standards & environment readiness — the foundation for every project.",groups:[
   {title:"Naming & Database Standards",items:[
     {t:"Objects use lowercase snake_case; no spaces/special chars",w:"Portability & consistency.",v:"names match ^[a-z0-9_]+$",m:"B"},
     {t:"Layer/zone prefixes applied (src_ / stg_ / dim_ / fact_)",w:"Self-describing datasets.",v:"prefix correct for the layer",m:"S"},
     {t:"No reserved keywords as object names (value, date, type)",w:"Calcite/DB rejects or needs quoting.",v:"name is not reserved",m:"B"},
     {t:"Environment & zone in the path, not the name",w:"Same name promotes DEV→PROD.",v:"no env suffix in names",m:"S"}]},
   {title:"Column & Data Type Standards",items:[
     {t:"Columns snake_case; key/date/bool suffixes (_id, _ts, is_)",w:"Type obvious from the name.",v:"suffixes applied",m:"B"},
     {t:"Money as DECIMAL(p,s) — never FLOAT; timestamps in UTC",w:"Floats lose pennies; TZ bugs silent.",v:"amount=DECIMAL; UTC",m:"B"},
     {t:"Consistent precision/scale & boolean representation",w:"Avoids join/sum mismatch.",v:"same DECIMAL across measures",m:"S"},
     {t:"Reserved words aliased (t.\"value\" AS metric_value)",w:"Prevents VDS-save failures.",v:"reserved cols aliased",m:"B"}]},
   {title:"Folder, Git & Coding Standards",items:[
     {t:"Repo/folder structure follows the standard",w:"Maintainability.",v:"matches template",m:"S"},
     {t:"Branch feature/<KEY>-desc; commit carries ticket key",w:"Traceability.",v:"branch+commit pattern",m:"B"},
     {t:"PR template & lint/code-style followed",w:"Reviewable code.",v:"PR template; lint passes",m:"S"}]},
   {title:"SQL, Performance & Logging Standards",items:[
     {t:"SQL standards (no SELECT *, CTEs, sargable)",w:"Correctness & speed.",v:"review vs standard",m:"B"},
     {t:"Performance standards (partitioning, pushdown, reflections)",w:"Designed for scale.",v:"documented & applied",m:"S"},
     {t:"Logging standard (structured, run id, metrics)",w:"Operability.",v:"logging spec followed",m:"S"}]},
   {title:"Error Handling, Audit, Security & Privacy",items:[
     {t:"Error-handling & reject standard defined",w:"No silent failures.",v:"standard in place",m:"S"},
     {t:"Audit standard (who/what/when)",w:"Compliance & lineage.",v:"audit fields defined",m:"S"},
     {t:"Security standard (least-privilege, secrets in vault)",w:"Breach prevention.",v:"no secrets; RBAC",m:"B"},
     {t:"Data-privacy standard (PII classification, masking)",w:"Compliance.",v:"PII handling defined",m:"S"}]},
   {title:"Environment Readiness & Access",items:[
     {t:"Git access provisioned",w:"Can't build without it.",v:"repo access confirmed",m:"B"},
     {t:"Database access (source & target) provisioned",w:"Build & test.",v:"connections verified",m:"B"},
     {t:"Data Lake access provisioned",w:"Storage access.",v:"lake paths reachable",m:"B"},
     {t:"Pipeline / orchestration access provisioned",w:"Deploy & schedule.",v:"tool access confirmed",m:"S"}]}]},
 {key:"requirements",n:1,name:"Requirement Understanding",sub:"Understand the business need and analyse sources & targets before any build.",groups:[
   {title:"Business & Acceptance",items:[
     {t:"Business understanding & objective documented",w:"Wrong thing = costliest defect.",v:"requirement doc linked",m:"B"},
     {t:"Functional requirements captured",w:"Defines what to build.",v:"FRs listed",m:"B"},
     {t:"Non-functional requirements (SLA, volume, security)",w:"Drives design.",v:"NFRs listed",m:"S"},
     {t:"Acceptance criteria defined & agreed",w:"Defines 'done'.",v:"AC on ticket; confirmed",m:"B"}]},
   {title:"Source & Target Analysis",items:[
     {t:"Source analysis (systems, schemas, owners, connections)",w:"Completeness needs every source.",v:"source inventory",m:"B"},
     {t:"Target analysis (system, layer, model, grain, SCD)",w:"Defines where & how output lands.",v:"target design documented",m:"B"},
     {t:"Data profiling (counts, keys, nulls, ranges, samples)",w:"Real-data surprises break designs.",v:"profiling attached",m:"S"},
     {t:"Gap analysis (source vs requirement)",w:"Surfaces missing data.",v:"gaps documented",m:"S"}]},
   {title:"Risk, Assumptions, Dependencies, Rules",items:[
     {t:"Risk assessment completed",w:"Mitigate before building.",v:"risks + mitigations",m:"S"},
     {t:"Assumptions documented",w:"Makes unknowns explicit.",v:"assumptions log",m:"S"},
     {t:"Dependencies identified",w:"Changes cascade.",v:"dependency list",m:"S"},
     {t:"Business rules captured",w:"Logic to build & test.",v:"rules documented",m:"B"}]}]},
 {key:"techdoc",n:2,name:"Technical Documentation",sub:"Produce the design & documentation set to FLANG standards.",groups:[
   {title:"Mapping & Design",items:[
     {t:"Source-to-target mapping (STTM) — field level",w:"Build-and-test contract.",v:"STTM linked",m:"B"},
     {t:"Technical design document",w:"Single source of truth.",v:"design doc linked",m:"B"},
     {t:"Transformation rules documented",w:"Unambiguous logic.",v:"rules in design",m:"B"},
     {t:"Data dictionary (name, type, desc, source, rule, PII)",w:"Self-describing data.",v:"dictionary per column",m:"B"}]},
   {title:"Architecture & Diagrams",items:[
     {t:"Architecture diagram",w:"Shared mental model.",v:"diagram attached",m:"S"},
     {t:"Data-flow diagram",w:"Reveals gaps.",v:"flow diagram attached",m:"S"},
     {t:"ER / data-model diagram",w:"Clarifies keys & grain.",v:"ERD attached",m:"S"}]},
   {title:"Operational Design",items:[
     {t:"Performance design (volume, partitioning, reflections)",w:"Design for scale.",v:"documented",m:"S"},
     {t:"Logging design",w:"Operability.",v:"documented",m:"S"},
     {t:"Restart / recovery strategy",w:"Resilience.",v:"documented",m:"S"},
     {t:"Error-handling design",w:"Plan for failures.",v:"documented",m:"S"}]},
   {title:"Version & Approval",items:[
     {t:"Version history maintained",w:"Auditable changes.",v:"version log",m:"S"},
     {t:"Docs stored in agreed location & linked",w:"Findable.",v:"links on ticket",m:"B"}]}]},
 {key:"ready",n:3,name:"Definition of Ready",approval:true,sub:"Submit phases 0–2 to the Technical Lead for sign-off to start development.",groups:[
   {title:"Readiness Checklist",items:[
     {t:"Requirement doc, STTM & data dictionary attached",w:"Lead reviews artifacts.",v:"all linked",m:"B"},
     {t:"Diagrams (architecture + ER) attached",w:"Design reviewable.",v:"diagrams linked",m:"S"},
     {t:"Standards (Phase 0) confirmed applied",w:"No surprises in review.",v:"self-check done",m:"B"},
     {t:"Dev scope declared with rationale",w:"Sets build phases.",v:"scope + rationale",m:"B"},
     {t:"Open questions / assumptions listed",w:"Focuses review.",v:"list present",m:"S"}]},
   {title:"Approval Workflow",items:[
     {t:"Ticket In Review / assigned to Technical Lead",w:"Triggers review.",v:"status + assignee",m:"B"},
     {t:"Lead sign-off (Ready / Ready w conditions / Not Ready)",w:"Gate to start build.",v:"decision + signature",m:"B"}]}]},
 {key:"review-loop",n:4,name:"Review Loop",sub:"Capture feedback, correct phases 1–2, re-submit. Iterate until approved.",groups:[
   {title:"Feedback & Iteration",items:[
     {t:"Lead/architect feedback captured",w:"Actionable & auditable.",v:"review comments present",m:"B"},
     {t:"Each feedback item actioned or answered",w:"Nothing dropped.",v:"each point resolved",m:"B"},
     {t:"Phases 1–2 corrected per feedback",w:"Fix source of truth.",v:"docs updated",m:"B"},
     {t:"Iteration history / comparison recorded",w:"Audit of changes.",v:"version diff",m:"S"},
     {t:"Re-submitted for re-review if material",w:"Closes the loop.",v:"re-review requested",m:"S"},
     {t:"Final design APPROVED by the Lead",w:"Starts the build.",v:"approval recorded",m:"B"}]}]},
 {key:"development",n:5,name:"Development",naAllowed:true,sub:"Build only the selected technologies. Mark sections N/A with a reason where not applicable.",groups:[
   {title:"ETL / ELT",tech:["ETL","ELT"],items:[
     {t:"Workflow built; parameters externalized (no hardcoding)",w:"Promotable.",v:"context/config used",m:"B"},
     {t:"Scheduling & dependencies configured",w:"Correct sequencing.",v:"schedule/DAG set",m:"S"},
     {t:"Logging, audit & restartability implemented",w:"Operable & resilient.",v:"logs+audit+resume",m:"S"},
     {t:"Incremental / CDC logic validated",w:"No missed/dup rows.",v:"delta+boundary tested",m:"S"},
     {t:"Performance tuned (bulk, parallelism)",w:"Meets SLA.",v:"timed on real volume",m:"S"}]},
   {title:"SQL",tech:["SQL"],items:[
     {t:"Coding standards (no SELECT *, CTEs, aliases)",w:"Readable, stable.",v:"review SELECT list",m:"B"},
     {t:"Optimization & execution plan reviewed",w:"Plan is the truth.",v:"EXPLAIN/profile reviewed",m:"B"},
     {t:"Indexes/partitions used; sargable predicates",w:"Avoids full scans.",v:"plan shows pruning",m:"S"},
     {t:"Business rules; exception handling",w:"Correct & resilient.",v:"rules tested",m:"S"}]},
   {title:"VDS (Dremio)",tech:["VDS"],items:[
     {t:"Saved as VDS in correct space; validates (reserved aliased)",w:"VDS is the deliverable.",v:"VDS at path; validates",m:"B"},
     {t:"Pushdown & partition pruning verified in profile",w:"Avoid full scans.",v:"profile shows pushdown",m:"S"},
     {t:"Reflection created/considered; acceleration CHOSEN",w:"Biggest speed lever.",v:"profile = CHOSEN",m:"E"},
     {t:"Caching, metadata fresh, security set",w:"Perf & governance.",v:"metadata refreshed; grants",m:"S"}]},
   {title:"Python",tech:["PYTHON"],items:[
     {t:"PEP8/lint clean; config externalized; secrets in vault",w:"Quality & security.",v:"lint passes; no secrets",m:"B"},
     {t:"Structured logging & exception handling",w:"Observability.",v:"logs + try/except",m:"S"},
     {t:"Unit tests written & passing",w:"Regression protection.",v:"pytest green",m:"S"}]},
   {title:"Spark / Databricks",tech:["SPARK","DATABRICKS"],items:[
     {t:"Explicit schema; partitioning matches query patterns",w:"Stable & prunable.",v:"schema; partitionBy",m:"S"},
     {t:"Cache reused DFs; broadcast small dims; skew handled",w:"Performance.",v:"Spark UI reviewed",m:"S"},
     {t:"Small-file compaction; runtime within SLA",w:"Read performance.",v:"files ~128–256MB",m:"S"}]},
   {title:"Data Lake / API / Streaming",tech:["DATALAKE","API","STREAMING"],items:[
     {t:"Storage zone/format/partitioning; least-privilege access",w:"Cost & security.",v:"Parquet+partitions; RBAC",m:"S"},
     {t:"API auth/rate-limit/pagination; or streaming offsets/idempotency",w:"Reliability.",v:"tested per integration",m:"S"}]}]},
 {key:"unit-testing",n:6,name:"Unit Testing",sub:"Design and run test cases, validate data, and attach evidence.",groups:[
   {title:"Test Case Design",items:[
     {t:"Positive cases",w:"Happy path works.",v:"written & passing",m:"B"},
     {t:"Negative & exception cases",w:"Bad input handled.",v:"written & passing",m:"B"},
     {t:"Boundary & null cases",w:"Edges hide bugs.",v:"written & passing",m:"S"},
     {t:"Duplicate-handling cases",w:"No dupes propagate.",v:"dup-key assertion=0",m:"S"},
     {t:"Incremental & full-load cases",w:"Both modes correct.",v:"both tested",m:"S"},
     {t:"Performance & regression cases",w:"No slow-downs.",v:"timed; regression green",m:"S"}]},
   {title:"Validation",items:[
     {t:"Source count = target count",w:"Completeness proof.",v:"counts reconcile",m:"B"},
     {t:"Checksum / control-total match",w:"Values not just counts.",v:"SUM/hash reconciles",m:"S"},
     {t:"Business-rule validation",w:"Logic correct.",v:"rule assertions=0",m:"B"},
     {t:"Exception validation",w:"Errors routed.",v:"bad rows in reject store",m:"S"}]},
   {title:"Evidence",items:[
     {t:"Test evidence uploaded (results, counts, screenshots)",w:"Proof, not claims.",v:"evidence attached below",m:"B"}]}]},
 {key:"peer-review",n:7,name:"Peer Review",approval:true,sub:"Independent review across SQL, architecture, performance, docs, standards & security.",groups:[
   {title:"Review Dimensions",items:[
     {t:"SQL / code review",w:"Logic & quality.",v:"comments resolved",m:"B"},
     {t:"Architecture review",w:"Sound design.",v:"architecture approved",m:"S"},
     {t:"Performance review",w:"Meets SLA at scale.",v:"perf signed off",m:"S"},
     {t:"Documentation review",w:"Docs match build.",v:"docs verified",m:"S"},

/* =================== STORE (localStorage) =================== */
const KEY="de-portal-v1";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{projects:[]}}catch(e){return {projects:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
let DB=load();
function uid(){return Math.random().toString(36).slice(2,9)}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function findP(id){return DB.projects.find(p=>p.id===id)}
function itemKey(pk,gi,ii){return pk+"."+gi+"."+ii}
function groupApplies(g,dt){return !g.tech || g.tech.some(t=>dt.includes(t))}
function applicableKeys(phase,dt){const k=[];phase.groups.forEach((g,gi)=>{if(!groupApplies(g,dt))return;g.items.forEach((_,ii)=>k.push(itemKey(phase.key,gi,ii)))});return k}
function phaseState(p,key){p.phases=p.phases||{};return p.phases[key]||(p.phases[key]={status:"NOT_STARTED",approval:"PENDING"})}
function phasePct(p,phase){const st=phaseState(p,phase.key);if(st.status==="NA"||st.status==="COMPLETED")return 100;const ks=applicableKeys(phase,p.devTypes);const d=ks.filter(k=>p.checks[k]).length;return ks.length?Math.round(d/ks.length*100):0}
function overall(p){let t=0,d=0;PHASES.forEach(ph=>{const st=phaseState(p,ph.key);if(st.status==="NA"){return}const ks=applicableKeys(ph,p.devTypes);t+=ks.length;d+=ks.filter(k=>p.checks[k]).length});return t?Math.round(d/t*100):0}
function act(p,msg){p.activity=p.activity||[];p.activity.unshift({msg,at:Date.now(),by:USER});p.activity=p.activity.slice(0,40)}
function ago(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+"s ago";const m=Math.floor(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago"}

  const utAvg=ps.length?Math.round(ps.reduce((a,p)=>a+phasePct(p,PHASES[6]),0)/ps.length):0;
  const docAvg=ps.length?Math.round(ps.reduce((a,p)=>a+phasePct(p,PHASES[2]),0)/ps.length):0;
  const stat=(l,v,s,ic)=>'<div class="card stat glass"><div><div class="l">'+l+'</div><div class="v">'+v+'</div>'+(s?'<div class="s">'+s+'</div>':'')+'</div><div class="ic">'+ic+'</div></div>';

    +'<div class="small muted mt" style="margin-top:4px">'+esc(p.source)+' → '+esc(p.target)+' · '+p.devTypes.join(", ")+'</div>'
    +'<div class="mt" style="margin-top:7px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="badge b">Phase '+p.currentPhase+' · '+esc(ph.name)+'</span></div></div>'
    +'<span class="btn sm">Open →</span></a>'}).join("")||'<div class="card hint">No projects yet. Create your first one.</div>';

  $("app").innerHTML='<div class="wrap">'
    +'<div class="row" style="align-items:flex-end"><div><h1 style="font-size:30px">Governance Dashboard</h1><div class="muted small">Phase-driven delivery across '+ps.length+' projects · FLANG standards</div></div><div class="spacer"></div><a class="btn primary" href="#/new">+ New Project</a></div>'
    +'<div class="grid mt" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">'
      +stat("Overall Completion",avg+"%","","◍")+stat("Active Projects",active,"total","▦")+stat("Pending Reviews",pending,"awaiting sign-off","⚑")
      +stat("High Risk",highRisk,"","⚠")+stat("Unit Testing",utAvg+"%","avg","✓")+stat("Documentation",docAvg+"%","avg","▤")+'</div>'
    +'<div class="grid mt" style="grid-template-columns:2fr 1fr">'
      +'<div class="card pad"><h3 class="mb">Projects by Phase</h3><div style="display:flex;gap:4px;align-items:flex-end">'+bars+'</div></div>'
      +'<div class="card pad"><h3 class="mb">Risk Distribution</h3><div style="display:flex;align-items:center;gap:16px"><div class="ring-wrap" style="width:140px;height:140px">'+donut+'</div><div style="display:flex;flex-direction:column;gap:6px">'+legend+'</div></div></div></div>'
    +'<div class="grid mt" style="grid-template-columns:2fr 1fr">'
      +'<div><h2 class="mb" style="font-size:22px">Projects</h2><div class="grid">'+pcards+'</div></div>'

/* =================== WORKSPACE =================== */
let activeIdx=0;
function renderWork(id){
  const p=findP(id);if(!p){location.hash="#/";return}
  if(location.hash.indexOf("__keep")<0)activeIdx=p.currentPhase;
  const phase=PHASES[activeIdx];const st=phaseState(p,phase.key);
  const reqKeys=applicableKeys(phase,p.devTypes);const done=reqKeys.filter(k=>p.checks[k]).length;
  const isNA=st.status==="NA";const ppct=isNA?100:(reqKeys.length?Math.round(done/reqKeys.length*100):100);
  const canAdv=isNA||done>=reqKeys.length;

  const steps=PHASES.map((ph,i)=>{const s=phaseState(p,ph.key);const cls=s.status==="COMPLETED"?"done":s.status==="NA"?"na":(i===p.currentPhase?"cur":"");
    const mark=s.status==="COMPLETED"?"✓":s.status==="NA"?"∅":ph.n;
    return '<button class="step'+(i===activeIdx?" active":"")+'" onclick="goPhase(\''+id+'\','+i+')"><span class="n '+cls+'">'+mark+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ph.name)+'</span></button>'}).join("");

  let body="";
  if(phase.naAllowed){
    body+='<div class="nabar"><span style="font-weight:600">Is this phase applicable?</span><div class="miniseg">'
      +'<button class="'+(!isNA?"on":"")+'" onclick="setNA(\''+id+'\',false)">Applicable</button>'
      +'<button class="'+(isNA?"on na":"")+'" onclick="askNA(\''+id+'\')">Mark N/A</button></div></div>';
  }
  if(isNA){
    body+='<div class="card pad mt" style="border-style:dashed"><b>Marked N/A</b><div class="muted mt" style="margin-top:6px">'+esc(st.naReason||"")+'</div></div>';
  }else{
    phase.groups.forEach((g,gi)=>{if(!groupApplies(g,p.devTypes))return;
      body+='<div class="group"><div class="ghead"><span class="bar"></span><h3>'+esc(g.title)+'</h3>'+(g.tech?'<span class="badge muted">'+g.tech.join("/")+'</span>':'')+'</div>';
      g.items.forEach((it,ii)=>{const k=itemKey(phase.key,gi,ii);const ck=!!p.checks[k];
        body+='<label class="item'+(ck?" done":"")+'"><input type="checkbox" '+(ck?"checked":"")+' onchange="toggleItem(\''+id+'\',\''+k+'\',\''+phase.key+'\',this.checked)">'
          +'<div style="flex:1;min-width:0"><div style="display:flex;gap:8px;align-items:flex-start"><span class="t" style="flex:1">'+esc(it.t)+'</span><span class="badge '+it.m+'">'+MLBL[it.m]+'</span></div>'
          +(it.w?'<div class="w">'+esc(it.w)+'</div>':'')+(it.v?'<div class="v"><b>verify</b>'+esc(it.v)+'</div>':'')+'</div></label>'});
      body+='</div>';
    });
  }
  // advance bar
  let adv='<div class="adv">';
  if(phase.approval){adv+='<span style="font-weight:600">Sign-off:</span>'
    +'<button class="btn success sm" '+(canAdv?"":"disabled")+' onclick="advance(\''+id+'\',\'APPROVED\')">✓ Approve &amp; Continue</button>'
    +'<button class="btn sm" '+(canAdv?"":"disabled")+' onclick="advance(\''+id+'\',\'READY_WITH_CONDITIONS\')">Ready w/ conditions</button>'
    +'<button class="btn sm" onclick="advance(\''+id+'\',\'NOT_READY\')">Not Ready</button>';
  }else{adv+='<button class="btn primary" '+(canAdv?"":"disabled")+' onclick="advance(\''+id+'\')">'+(phase.n===9?"Complete Project":"Complete Phase "+phase.n+" → Next")+'</button>'}
  if(!canAdv)adv+='<span class="small muted">Verify all items (or mark N/A) to continue.</span>';
  adv+='</div>';

  // evidence + comments for this phase
  const evs=(p.evidence||[]).filter(e=>e.phaseKey===phase.key);
  const evHtml=evs.map(e=>'<a class="ev" href="'+esc(e.url)+'" target="_blank">⬆ <span style="flex:1">'+esc(e.name)+'</span><span class="small muted">'+ago(e.at)+'</span></a>').join("");
  const cms=(p.comments||[]).filter(c=>c.phaseKey===phase.key);
  const cmHtml=cms.map(c=>'<div class="cmt"><div class="meta"><b>'+esc(c.by)+'</b> · '+ago(c.at)+'</div>'+esc(c.body)+'</div>').join("");

  $("app").innerHTML='<div class="wrap"><a class="small muted" href="#/">← Dashboard</a>'
    +'<div class="card glass pad mt" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">'+ring(overall(p),72)
      +'<div style="flex:1;min-width:0"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><h1 style="font-size:24px">'+esc(p.name)+'</h1><span class="badge muted">'+esc(p.domain)+'</span><span class="small" style="color:'+RISKC[p.risk]+';font-weight:700">● '+p.risk+' RISK</span></div>'
      +'<div class="small muted mt" style="margin-top:4px">'+esc(p.source)+' → '+esc(p.target)+' · Owner '+esc(USER)+'</div>'
      +'<div class="mt" style="margin-top:7px;display:flex;gap:6px;flex-wrap:wrap">'+p.devTypes.map(d=>'<span class="badge b">'+d+'</span>').join("")+'</div></div>'
      +'<div style="display:flex;gap:6px"><button class="btn sm" onclick="copyJira(\''+id+'\')">Copy for JIRA</button></div></div>'
    +'<div class="grid work mt" style="grid-template-columns:250px 1fr">'
      +'<div class="card pad" style="height:max-content"><h3 class="mb">Lifecycle</h3>'+steps+'</div>'
      +'<div><div class="card pad"><div style="display:flex;gap:10px;align-items:flex-start"><div style="flex:1"><div style="display:flex;gap:8px;align-items:center"><span class="badge b">Phase '+phase.n+'</span><h2 style="font-size:21px">'+esc(phase.name)+'</h2></div><div class="muted small mt" style="margin-top:4px">'+esc(phase.sub)+'</div></div>'
        +'<span class="badge '+(st.status==="COMPLETED"?"ok":st.status==="NA"?"muted":"warn")+'">'+({NOT_STARTED:"Not started",IN_PROGRESS:"In progress",COMPLETED:"Completed",NA:"N/A"}[st.status]||st.status)+'</span></div>'
        +(isNA?"":'<div class="mt" style="display:flex;gap:10px;align-items:center"><div class="track" style="flex:1"><div class="fill" style="width:'+ppct+'%"></div></div><span class="small muted">'+done+'/'+reqKeys.length+'</span></div>')
        +body+adv+'</div>'
      +'<div class="card pad mt"><h3 class="mb">📎 Evidence ('+evs.length+')</h3>'+evHtml
        +'<div class="row" style="gap:8px;margin-top:6px"><input id="ev_name" placeholder="Evidence name (reconciliation.xlsx)" style="flex:1"><input id="ev_url" placeholder="Link / path" style="flex:1"><button class="btn sm" onclick="addEv(\''+id+'\',\''+phase.key+'\')">Attach</button></div>'
        +'<div class="small muted mt" style="margin-top:8px">Attach a link to the CI report, query result, profile or reconciliation.</div></div>'
      +'<div class="card pad mt"><h3 class="mb">💬 Comments ('+cms.length+')</h3>'+cmHtml
        +'<div class="row" style="gap:8px;align-items:flex-end"><textarea id="cm_body" placeholder="Add a comment for this phase…" style="flex:1;min-height:44px"></textarea><button class="btn sm" onclick="addCm(\''+id+'\',\''+phase.key+'\')">Send</button></div></div>'
      +'</div></div></div>';
}
function goPhase(id,i){activeIdx=i;if(location.hash.indexOf("__keep")<0)location.hash="#/p/"+id+"__keep";else renderWork(id)}
function toggleItem(id,k,pk,val){const p=findP(id);p.checks[k]=val;const st=phaseState(p,pk);if(st.status==="NOT_STARTED")st.status="IN_PROGRESS";save();renderWork(id)}
function setNA(id,na){const p=findP(id);const ph=PHASES[activeIdx];const st=phaseState(p,ph.key);if(!na){st.status="IN_PROGRESS";st.naReason="";act(p,"Phase "+ph.n+" marked applicable")}save();renderWork(id)}
function askNA(id){const r=prompt("Reason this phase is N/A (e.g., data already in the Data Lake; no ETL required):");if(r==null)return;if(!r.trim()){toast("A reason is required");return}const p=findP(id);const ph=PHASES[activeIdx];const st=phaseState(p,ph.key);st.status="NA";st.naReason=r.trim();act(p,"Phase "+ph.n+" marked N/A — "+r.trim());save();renderWork(id)}
function advance(id,approval){const p=findP(id);const ph=PHASES[activeIdx];const st=phaseState(p,ph.key);
  const reqKeys=applicableKeys(ph,p.devTypes);const done=reqKeys.filter(k=>p.checks[k]).length;
  if(st.status!=="NA"&&done<reqKeys.length){toast("Complete all items first");return}
  if(ph.approval&&!approval){toast("An approval decision is required");return}
  if(st.status!=="NA")st.status="COMPLETED";if(ph.approval){st.approval=approval;st.signedBy=USER;st.signedAt=Date.now()}
  act(p,"Phase "+ph.n+" ("+ph.name+") completed"+(approval?" — "+approval:""));
  const next=PHASES[ph.n+1];
  if(next){phaseState(p,next.key);if(p.phases[next.key].status==="NOT_STARTED")p.phases[next.key].status="IN_PROGRESS";p.currentPhase=next.n;activeIdx=next.n;toast("Phase "+ph.n+" complete → Phase "+next.n)}
  else{p.completed=true;toast("Project complete 🎉")}
  save();location.hash="#/p/"+id;renderWork(id);
}
function addEv(id,pk){const n=$("ev_name").value.trim(),u=$("ev_url").value.trim();if(!n||!u){toast("Name and link required");return}const p=findP(id);p.evidence.push({phaseKey:pk,name:n,url:u,at:Date.now(),by:USER});act(p,"Evidence added: "+n);save();renderWork(id)}
function addCm(id,pk){const b=$("cm_body").value.trim();if(!b)return;const p=findP(id);p.comments.push({phaseKey:pk,body:b,at:Date.now(),by:USER});act(p,"Added a comment");save();renderWork(id)}
function copyJira(id){const p=findP(id);const ph=PHASES[activeIdx];const st=phaseState(p,ph.key);let L=["*Phase "+ph.n+" — "+ph.name+" · "+p.name+"*",""];
  if(st.status==="NA"){L.push("_N/A — "+(st.naReason||"")+"_")}else{ph.groups.forEach((g,gi)=>{if(!groupApplies(g,p.devTypes))return;L.push("### "+g.title);g.items.forEach((it,ii)=>{const k=itemKey(ph.key,gi,ii);L.push("- ["+(p.checks[k]?"x":" ")+"] "+it.t+"  _("+MLBL[it.m]+")_")});L.push("")})}
  navigator.clipboard.writeText(L.join("\n")).then(()=>toast("Copied for JIRA")).catch(()=>toast("Copy failed"))}

/* =================== THEME =================== */
function applyTheme(){const d=localStorage.getItem("portal-theme")==="dark";document.documentElement.classList.toggle("dark",d);$("themeBtn").textContent=d?"☀":"☾"}
$("themeBtn").onclick=()=>{const d=!document.documentElement.classList.contains("dark");localStorage.setItem("portal-theme",d?"dark":"light");applyTheme()};
applyTheme();
route();
</script>
