<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Engineering — Definition of Done</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#0ea5e9;
    --ok:#22c55e; --warn:#f59e0b; --m:#ef4444; --o:#64748b;
    --B:#22c55e; --S:#38bdf8; --E:#a855f7;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0f172a,#0f172aee);border-bottom:1px solid var(--line);padding:14px 20px}
  h1{margin:0;font-size:18px;letter-spacing:.3px}
  .sub{color:var(--muted);font-size:12px;margin-top:3px}
  .wrap{max-width:980px;margin:0 auto;padding:18px 20px 80px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
  .chip{cursor:pointer;user-select:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);
        padding:5px 11px;border-radius:999px;font-size:12.5px;transition:.15s}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);color:#04293b;border-color:var(--accent);font-weight:600}
  .tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  select,button{font:inherit}
  select{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  button{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:8px;padding:7px 13px;transition:.15s}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#04293b;border-color:var(--accent);font-weight:600}
  .prog{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px}
  .prog .track{height:8px;background:#0b1220;border-radius:6px;overflow:hidden;margin-top:7px}
  .prog .fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--accent));width:0;transition:.3s}
  .prog small{color:var(--muted)}
  section{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .sh{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--panel2);border-bottom:1px solid var(--line)}
  .sh h2{margin:0;font-size:14.5px}
  .sh .count{margin-left:auto;color:var(--muted);font-size:12px}
  .item{display:flex;gap:11px;padding:11px 15px;border-bottom:1px solid #2a3852}
  .item:last-child{border-bottom:0}
  .item input{margin-top:3px;width:17px;height:17px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .item .body{flex:1}
  .item .req{font-weight:500}
  .item.done .req{text-decoration:line-through;color:var(--muted)}
  .why{color:var(--muted);font-size:12.5px;margin-top:3px}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .tag{font-size:10.5px;padding:2px 7px;border-radius:5px;border:1px solid var(--line);color:var(--muted)}
  .tag.M{color:#fff;background:var(--m);border-color:var(--m)}
  .tag.O{color:#fff;background:var(--o);border-color:var(--o)}
  .tag.B{border-color:var(--B);color:var(--B)} .tag.S{border-color:var(--S);color:var(--S)} .tag.E{border-color:var(--E);color:var(--E)}
  .tag.auto{border-color:var(--warn);color:var(--warn)}
  .hidden{display:none}
  .modal{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal.open{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:760px;width:100%;max-height:85vh;display:flex;flex-direction:column}
  .card .ch{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .card textarea{flex:1;margin:0;border:0;background:#0b1220;color:var(--txt);font-family:ui-monospace,Consolas,monospace;font-size:12.5px;padding:14px;resize:none;min-height:50vh}
  .card .cf{padding:11px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ok);color:#04230f;padding:9px 16px;border-radius:8px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  a.src{color:var(--accent);font-size:12px;text-decoration:none}
  @media print{header,.bar,.tools,.prog,.chip,button{display:none!important}body{background:#fff;color:#000}section{break-inside:avoid}}
</style>
</head>
<body>
<header>
  <h1>Data Engineering — Definition of Done</h1>
  <div class="sub">Mandatory on every DE ticket. Pick the technologies the ticket touches; the relevant checks appear. Then <b>Copy for JIRA</b>.</div>
  <div class="bar" id="chips"></div>
  <div class="tools">
    <label class="sub">Maturity:&nbsp;</label>
    <select id="maturity">
      <option value="E">Enterprise (all items)</option>
      <option value="S" selected>Standard (Basic + Standard)</option>
      <option value="B">Basic only</option>
    </select>
    <button id="copyBtn" class="primary">📋 Copy for JIRA</button>
    <button id="resetBtn">↺ Reset checks</button>
    <button onclick="window.print()">🖨 Print / PDF</button>
  </div>
  <div class="prog">
    <small><b id="pPct">0%</b> of mandatory items complete &middot; <span id="pCount">0 / 0</span></small>
    <div class="track"><div class="fill" id="pFill"></div></div>
  </div>
</header>

<div class="wrap" id="list"></div>

<div class="modal" id="modal">
  <div class="card">
    <div class="ch">
      <b>Paste into JIRA</b>
      <select id="fmt" style="margin-left:auto">
        <option value="md">JIRA Cloud Markdown (task list)</option>
        <option value="smart">Smart Checklist for Jira</option>
        <option value="wiki">JIRA Wiki markup</option>
      </select>
    </div>
    <textarea id="out" spellcheck="false" readonly></textarea>
    <div class="cf">
      <button class="primary" id="copyOut">Copy to clipboard</button>
      <button id="closeModal">Close</button>
      <span class="sub" style="margin-left:auto">Tip: in JIRA Cloud, paste Markdown into the description — it auto-converts.</span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---- Checklist data (from DoD-Checklist.md). m=mandatory, mat=B/S/E, auto=automatable ---- */
const SECTIONS = [
 {key:"core", name:"Core — every DE ticket", always:true, items:[
   {t:"Business requirement understood & acceptance criteria confirmed", w:"Prevents building the wrong thing — the #1 source of rework", m:1, mat:"B"},
   {t:"Source & target systems identified", w:"Can't validate completeness without knowing every source/target", m:1, mat:"B"},
   {t:"Impact analysis completed (downstream tables / jobs / reports)", w:"A schema change can silently break reflections & BI", m:1, mat:"S"},
   {t:"Code peer-reviewed (PR approved)", w:"Catches defects and spreads knowledge", m:1, mat:"B", auto:1},
   {t:"Testing completed (unit / integration / data validation)", w:"Proves the change works before prod", m:1, mat:"S", auto:1},
   {t:"Data quality checks passed (counts, nulls, duplicates, PKs)", w:"Detects dropped/duplicated/invalid rows", m:1, mat:"B", auto:1},
   {t:"Security & governance verified (no secrets, access, PII)", w:"Breach prevention and compliance", m:1, mat:"B", auto:1},
   {t:"Deployed via CI/CD (Git committed, PR merged, pipeline green)", w:"Repeatable, auditable promotion", m:1, mat:"S", auto:1},
   {t:"Rollback plan available", w:"Fast recovery from a bad deploy", m:1, mat:"S"},
   {t:"Documentation & JIRA updated", w:"Single source of truth for support & onboarding", m:1, mat:"B"},
   {t:"BI notified / refresh requested (if reports or semantic layer affected)", w:"Prevents broken or stale reports", m:0, mat:"S"},
   {t:"Final sign-off (peer + QA + business)", w:"Explicit go decision; meets the actual need", m:1, mat:"B"},
 ]},
 {key:"unit", name:"Unit Testing & Evidence (every ticket)", always:true, items:[
   {t:"Test cases written: happy path + edge + negative/error cases", w:"Bugs hide in the cases you didn't write", m:1, mat:"B"},
   {t:"Tests automated and runnable in CI (not just locally)", w:"Manual-only tests rot and get skipped", m:1, mat:"S", auto:1},
   {t:"Representative test data used (prod-like volume + edge values)", w:"Toy data hides scale and edge defects", m:1, mat:"S"},
   {t:"Idempotency / re-run tested (no duplicates, same result twice)", w:"Pipelines get re-run; they must be safe", m:1, mat:"S", auto:1},
   {t:"Code coverage >= team threshold", w:"Untested code is unproven code", m:0, mat:"S", auto:1},
   {t:"Source -> target row/column reconciliation captured", w:"Proves nothing was dropped or duplicated", m:1, mat:"S", auto:1},
   {t:"Evidence attached: CI report / coverage link or screenshot", w:"Reviewer must see proof, not a claim", m:1, mat:"S", auto:1},
   {t:"Unit Tests field = Passed (set by CI, not by hand)", w:"CI proof beats the honour system", m:1, mat:"S", auto:1},
   {t:"Tests peer-reviewed alongside the code", w:"Bad tests give false confidence", m:0, mat:"E"},
 ]},
 {key:"sql", name:"SQL (optimization & performance)", items:[
   {t:"No SELECT * — explicit, named columns only", w:"Schema-drift breakage + wasted I/O", m:1, mat:"B", auto:1},
   {t:"Pre-filter rows in CTEs BEFORE joins (reduce early)", w:"Smaller inputs = far cheaper joins", m:1, mat:"S"},
   {t:"Sargable predicates — no functions on filtered/indexed columns", w:"Functions kill index/partition pruning", m:1, mat:"S", auto:1},
   {t:"Join keys & cardinality verified — no unintended fan-out", w:"A bad join silently multiplies rows", m:1, mat:"S"},
   {t:"Correct join type & order; avoid DISTINCT to mask duplication", w:"DISTINCT often hides a join defect", m:1, mat:"S"},
   {t:"Explain/query plan reviewed — no full scans on large tables", w:"Confirms indexes/partitions/reflections used", m:1, mat:"S"},
   {t:"Window functions instead of self-joins for ranking/dedupe", w:"Cheaper and clearer than self-joins", m:0, mat:"S"},
   {t:"No implicit type conversions in joins/filters", w:"Breaks index use; can corrupt matches", m:1, mat:"S"},
   {t:"NULL handling validated (joins, aggregates, COALESCE)", w:"NULLs silently skew results", m:1, mat:"B", auto:1},
   {t:"Set-based logic, not row-by-row / cursors", w:"RBAR does not scale", m:1, mat:"S"},
   {t:"No ORDER BY / LIMIT inside subqueries or views", w:"Non-deterministic; optimizer ignores it", m:1, mat:"S", auto:1},
   {t:"Statistics fresh; execution time within SLA on prod-like volume", w:"Stale stats = bad plans", m:1, mat:"S"},
   {t:"Result correctness validated vs expected output (test query)", w:"Fast and wrong is still wrong", m:1, mat:"S", auto:1},
 ]},
 {key:"talend", name:"Talend (ETL/ELT)", items:[
   {t:"Context groups/variables per env (DEV/TEST/UAT/PROD)", w:"Wrong context writes to the wrong environment", m:1, mat:"B"},
   {t:"No hardcoded paths / connections / credentials (context + vault)", w:"Breaks promotion; security risk", m:1, mat:"B", auto:1},
   {t:"Shared/reused connection & schema metadata (no copies)", w:"Drift between copies causes silent bugs", m:0, mat:"S"},
   {t:"Incremental/delta extract (watermark/CDC) validated", w:"Full reloads are slow and double-count", m:1, mat:"S"},
   {t:"tMap logic validated — expressions, null handling, reject flows", w:"tMap is where most logic bugs live", m:1, mat:"S"},
   {t:"Reject & error handling (tDie / tWarn / reject links) wired", w:"Failures must be caught, not silent", m:1, mat:"S"},
   {t:"Logging & stats enabled (tStatCatcher / tFlowMeter / tLogCatcher)", w:"Needed for triage and audit", m:1, mat:"S"},
   {t:"Lookups tuned (load-once vs reload, memory vs DB, match model)", w:"Wrong lookup model blows memory or rows", m:1, mat:"S"},
   {t:"Bulk/parallel load & commit/batch size tuned for volume", w:"Row-by-row inserts are a common bottleneck", m:0, mat:"S"},
   {t:"JVM/memory (Xmx) sized for data volume", w:"OOM on large loads", m:0, mat:"S"},
   {t:"Idempotent load (truncate-load or upsert) — re-run safe", w:"Re-runs must not duplicate", m:1, mat:"S"},
   {t:"Job dependencies & schedule (tRunJob / TAC) correct", w:"Order prevents partial/mis-sequenced loads", m:1, mat:"S"},
   {t:"End-to-end tested in non-prod with sample + edge data", w:"Proves it runs before prod", m:1, mat:"B"},
   {t:"Target load reconciled (row counts, key integrity)", w:"Confirms completeness", m:1, mat:"S", auto:1},
 ]},
 {key:"python", name:"Python / PySpark (standards)", items:[
   {t:"Virtual env / requirements pinned & documented", w:"Reproducible runtime; no supply-chain drift", m:1, mat:"B", auto:1},
   {t:"Config externalized; secrets in vault/env (none in code)", w:"Promote without edits; no leaked keys", m:1, mat:"B", auto:1},
   {t:"Exception handling + structured logging", w:"Uncaught errors corrupt/partial-load data", m:1, mat:"B"},
   {t:"Unit tests (pytest) incl. transformations & edge cases", w:"Regression protection", m:1, mat:"S", auto:1},
   {t:"Lint / format / type-check passed (ruff/black/mypy)", w:"Readability & early defect catch", m:0, mat:"S", auto:1},
   {t:"Explicit schema defined (no inferSchema in prod)", w:"Inference is slow and unstable", m:1, mat:"S"},
   {t:"Idempotent writes (overwrite/merge); re-run safe", w:"Re-runs must not duplicate", m:1, mat:"S"},
 ]},
 {key:"pyspark_mm", name:"PySpark — MM (Movement Manager) ETL/ELT", items:[
   {t:"MM source extract validated (Oracle ADB query + incremental key)", w:"Wrong key = missed or doubled rows", m:1, mat:"S"},
   {t:"Spark config sized (executors, cores, memory, shuffle partitions)", w:"Defaults waste resources or OOM", m:1, mat:"S"},
   {t:"Watermark / checkpoint for incremental correctness", w:"Guarantees exactly-once incremental load", m:1, mat:"S"},
   {t:"Partitioning on write (partitionBy) matches query patterns", w:"Drives downstream pruning", m:1, mat:"S"},
   {t:"Iceberg/parquet write mode correct (append/overwrite/merge)", w:"Wrong mode duplicates or wipes data", m:1, mat:"S"},
   {t:"Small-file problem avoided (coalesce/repartition/compaction)", w:"Too many small files cripple reads", m:1, mat:"S"},
   {t:"Broadcast small dims; data skew handled", w:"Skew/huge shuffles dominate runtime", m:0, mat:"S"},
   {t:"Source -> target reconciliation (counts + key checks)", w:"End-to-end completeness proof", m:1, mat:"S", auto:1},
 ]},
 {key:"pyspark_hoc", name:"PySpark — HOC ETL/ELT (performance)", items:[
   {t:"HOC source extract validated", w:"Correct, complete input", m:1, mat:"S"},
   {t:"Spark UI profiled — stages, skew, spill reviewed", w:"You can't tune what you don't measure", m:1, mat:"S"},
   {t:"Shuffle partitions tuned to data volume", w:"Default 200 is rarely right", m:1, mat:"S"},
   {t:"Predicate & projection pushdown verified", w:"Read only what you need", m:1, mat:"S"},
   {t:"Native functions over UDFs (or vectorized pandas_udf)", w:"Python UDFs are slow and unoptimizable", m:0, mat:"S"},
   {t:"cache/persist only reused DataFrames; unpersist after", w:"Stray caching wastes memory", m:0, mat:"S"},
   {t:"Output file sizing ~128-256MB target files", w:"Right-sized files = fast reads", m:0, mat:"E"},
   {t:"Runtime within SLA & tracked vs previous runs", w:"Catch performance regressions", m:1, mat:"S", auto:1},
   {t:"Source -> target reconciliation", w:"Completeness proof", m:1, mat:"S", auto:1},
 ]},
 {key:"dremio_pds", name:"Dremio — PDS (create / modify)", items:[
   {t:"PDS promoted from the correct source path (raw zone)", w:"Wrong source = wrong data everywhere downstream", m:1, mat:"B"},
   {t:"Schema/types inferred correctly (no unintended coercion)", w:"Bad types break casts & joins downstream", m:1, mat:"S"},
   {t:"Partitions / folder structure recognized", w:"Drives pruning and refresh cost", m:1, mat:"S"},
   {t:"Metadata refresh run & successful (ALTER PDS REFRESH METADATA)", w:"Stale metadata = wrong/failed queries", m:1, mat:"B", auto:1},
   {t:"Refresh policy set (incremental vs full, interval)", w:"Balance freshness vs cost", m:1, mat:"S"},
   {t:"Row count matches source after promotion", w:"Catches partial promotion", m:1, mat:"S", auto:1},
   {t:"File format consistent (parquet/iceberg), no mixed schemas", w:"Mixed schemas fail at query time", m:1, mat:"S"},
   {t:"Naming & space/folder governance followed", w:"Discoverability + access control", m:1, mat:"S"},
   {t:"Old/duplicate PDS removed if replaced", w:"Stale datasets mislead consumers", m:0, mat:"S"},
   {t:"Query access permissions set on the PDS", w:"Least-privilege from the start", m:1, mat:"S"},
 ]},
 {key:"dremio_vds", name:"Dremio — VDS (create / modify)", items:[
   {t:"VDS SQL runs and returns the expected columns", w:"The VDS is the consumer contract", m:1, mat:"B"},
   {t:"No SELECT *; explicit, business-friendly column names", w:"Stable contract; readable for BI", m:1, mat:"S"},
   {t:"Joins validated — no fan-out/duplication; cardinality checked", w:"A bad join silently inflates metrics", m:1, mat:"S"},
   {t:"Explicit type casts; filters & business rules correct", w:"Correctness of the published dataset", m:1, mat:"S"},
   {t:"Row-count & spot-value sanity vs source/expected", w:"Catches logic errors early", m:1, mat:"S", auto:1},
   {t:"Lineage verified (correct upstream PDS/VDS)", w:"Wrong lineage = wrong refresh & trust", m:1, mat:"S"},
   {t:"Downstream dependent VDS still valid (no breaking change)", w:"One change cascades to many consumers", m:1, mat:"E"},
   {t:"Correct space/folder + naming convention", w:"Governance & discoverability", m:1, mat:"S"},
   {t:"Description / wiki / labels added for the catalog", w:"Discoverable, self-describing data", m:0, mat:"S"},
   {t:"Column rename/removal communicated to consumers", w:"Avoids surprise dashboard breakage", m:1, mat:"E"},
   {t:"Query profile reviewed; reflection considered for hot VDS", w:"Consumer-facing latency", m:1, mat:"S"},
 ]},
 {key:"reflection", name:"Dremio — Reflections", items:[
   {t:"Reflection type correct (raw vs aggregation) for the use case", w:"Wrong type won't accelerate the query", m:1, mat:"S"},
   {t:"Dimensions/measures/display fields chosen correctly", w:"Missing fields = no acceleration", m:1, mat:"S"},
   {t:"Partition/sort on reflection set for pruning", w:"Drives reflection efficiency", m:0, mat:"E"},
   {t:"Reflection refresh completed successfully (job COMPLETED)", w:"Accelerating stale data is worse than none", m:1, mat:"S", auto:1},
   {t:"Incremental refresh used where possible", w:"Full refresh is costly", m:0, mat:"S"},
   {t:"Acceleration verified — plan shows MATCHED (not just CONSIDERED)", w:"Proves the reflection is actually used", m:1, mat:"E"},
   {t:"Target dashboards/queries confirmed to use it", w:"Unused reflection = pure cost", m:1, mat:"E"},
   {t:"Refresh schedule / TTL appropriate", w:"Freshness vs compute trade-off", m:0, mat:"E"},
   {t:"Refresh ordered after PDS metadata refresh", w:"Avoids accelerating stale metadata", m:1, mat:"S"},
   {t:"Storage footprint acceptable; unused reflections removed", w:"Reflections silently grow cost", m:0, mat:"E"},
 ]},
 {key:"dremio_security", name:"Dremio — Security (users / roles / privileges)", items:[
   {t:"User created via approved process (SSO/SCIM preferred)", w:"Shadow accounts are an audit risk", m:1, mat:"S"},
   {t:"Role created with least-privilege grants", w:"Over-broad roles = wide blast radius", m:1, mat:"S"},
   {t:"Role assigned to the correct user/group", w:"Wrong grant exposes data", m:1, mat:"S"},
   {t:"Privileges scoped to specific spaces/folders/PDS/VDS (no ALL/PUBLIC)", w:"Broad grants leak data", m:1, mat:"S"},
   {t:"Row/column-level security or masking applied for PII", w:"Compliance for sensitive data", m:1, mat:"E"},
   {t:"Access reviewed/approved by the data owner", w:"Owner accountability", m:1, mat:"S"},
   {t:"Service accounts use tokens (no shared passwords)", w:"Traceable, revocable access", m:1, mat:"S"},
   {t:"Grant/revoke change is logged/audited", w:"Traceability for audits", m:0, mat:"E"},
   {t:"Offboarded users' access removed", w:"Prevents lingering access", m:1, mat:"S"},
 ]},
 {key:"cdc", name:"Debezium / CDC", items:[
   {t:"Connector config validated (snapshot mode, table whitelist)", w:"Wrong scope = missing or extra tables", m:1, mat:"S"},
   {t:"Capture validated for insert / update / delete", w:"All change types must flow through", m:1, mat:"S"},
   {t:"Initial snapshot completed & validated", w:"Backfill correctness before streaming", m:1, mat:"S"},
   {t:"Tombstone / delete handling correct downstream", w:"Deletes must be represented, not lost", m:1, mat:"S"},
   {t:"Schema change / DDL evolution handled (registry)", w:"Source DDL must not break the pipeline", m:1, mat:"E"},
   {t:"Offsets / LSN / binlog position tracked & resumable", w:"Wrong offset = missed or replayed data", m:1, mat:"S"},
   {t:"Topic naming & key/partitioning chosen for ordering", w:"Per-key ordering correctness", m:1, mat:"S"},
   {t:"Idempotent / exactly-once apply — replay-safe (no dupes)", w:"Re-delivery must not duplicate", m:1, mat:"E", auto:1},
   {t:"Late / out-of-order events handled", w:"Streams are not ordered", m:1, mat:"S"},
   {t:"Dead-letter queue for poison messages", w:"One bad event must not stall the stream", m:0, mat:"E"},
   {t:"Consumer lag & throughput within SLA (monitored)", w:"Freshness guarantee", m:1, mat:"S", auto:1},
   {t:"Source -> target reconciliation after apply", w:"End-to-end correctness proof", m:1, mat:"E", auto:1},
 ]},
 {key:"api", name:"API / Xero", items:[
   {t:"Auth / OAuth token refresh handled", w:"Tokens expire; jobs must self-renew", m:1, mat:"S"},
   {t:"Rate limiting & retry/backoff implemented", w:"Avoids throttling and data gaps", m:1, mat:"S"},
   {t:"Pagination handled fully", w:"Partial pulls silently lose rows", m:1, mat:"S"},
   {t:"Schema / contract change detection in place", w:"APIs change without notice", m:1, mat:"E"},
   {t:"API failure & partial-load handling tested", w:"Partial loads must not corrupt targets", m:1, mat:"S"},
   {t:"Secrets stored in vault (no inline keys)", w:"Breach prevention", m:1, mat:"B", auto:1},
 ]},
 {key:"storage", name:"Storage / Data Lake (S3 / Azure)", items:[
   {t:"Correct zone & path convention (raw → curated → consumption)", w:"Wrong zone breaks downstream contracts", m:1, mat:"S"},
   {t:"File format & compression correct (parquet + snappy)", w:"Drives query cost & performance", m:1, mat:"S"},
   {t:"Partitioning scheme matches query patterns", w:"Bad partitioning = full scans", m:1, mat:"S"},
   {t:"Small files compacted", w:"Many tiny files cripple read performance", m:0, mat:"S"},
   {t:"Schema evolution handled (Iceberg / Delta)", w:"Avoids breakage on column changes", m:0, mat:"E"},
   {t:"Encryption at rest enabled", w:"Compliance baseline", m:1, mat:"S"},
   {t:"Least-privilege access (IAM/RBAC/SAS); no public buckets", w:"Limits blast radius; prevents leaks", m:1, mat:"S", auto:1},
   {t:"Lifecycle / retention policy applied", w:"Controls cost & compliance", m:0, mat:"E"},
   {t:"Naming convention for buckets/containers/prefixes", w:"Governance & discoverability", m:0, mat:"S"},
   {t:"_SUCCESS / manifest markers present for downstream", w:"Signals complete, safe-to-read data", m:0, mat:"E"},
 ]},
];

const TECHS = SECTIONS.filter(s=>!s.always);
const MAT_ORDER = {B:1,S:2,E:3};
const state = {active:new Set(), maturity:"S", checks:{}};

/* ---- render chips ---- */
const chipsEl = document.getElementById("chips");
TECHS.forEach(s=>{
  const c=document.createElement("div");
  c.className="chip"; c.textContent=s.name; c.dataset.key=s.key;
  c.onclick=()=>{ state.active.has(s.key)?state.active.delete(s.key):state.active.add(s.key); c.classList.toggle("on"); render(); };
  chipsEl.appendChild(c);
});
const allChip=document.createElement("div");
allChip.className="chip"; allChip.textContent="Select all";
allChip.onclick=()=>{ const on=state.active.size<TECHS.length; state.active=new Set(on?TECHS.map(t=>t.key):[]);
  document.querySelectorAll(".chip[data-key]").forEach(c=>c.classList.toggle("on",on)); render(); };
chipsEl.appendChild(allChip);

document.getElementById("maturity").onchange=e=>{state.maturity=e.target.value;render();};
document.getElementById("resetBtn").onclick=()=>{state.checks={};render();};

function visibleSections(){ return SECTIONS.filter(s=>s.always||state.active.has(s.key)); }
function itemVisible(it){ return MAT_ORDER[it.mat] <= MAT_ORDER[state.maturity]; }
function id(sk,i){ return sk+"_"+i; }

function render(){
  const list=document.getElementById("list"); list.innerHTML="";
  let mTot=0,mDone=0;
  visibleSections().forEach(s=>{
    const items=s.items.filter(itemVisible); if(!items.length) return;
    const sec=document.createElement("section");
    const sh=document.createElement("div"); sh.className="sh";
    sh.innerHTML=`<h2>${s.name}</h2><span class="count">${items.length} item${items.length>1?"s":""}</span>`;
    sec.appendChild(sh);
    s.items.forEach((it,i)=>{
      if(!itemVisible(it)) return;
      const key=id(s.key,i); const checked=!!state.checks[key];
      if(it.m){mTot++; if(checked)mDone++;}
      const row=document.createElement("label"); row.className="item"+(checked?" done":"");
      row.innerHTML=`<input type="checkbox" ${checked?"checked":""}>
        <div class="body"><div class="req">${it.t}</div>
        <div class="why">${it.w}</div>
        <div class="tags">
          <span class="tag ${it.m?"M":"O"}">${it.m?"Mandatory":"Optional"}</span>
          <span class="tag ${it.mat}">${({B:"Basic",S:"Standard",E:"Enterprise"})[it.mat]}</span>
          ${it.auto?'<span class="tag auto">CI-automatable</span>':''}
        </div></div>`;
      row.querySelector("input").onchange=e=>{state.checks[key]=e.target.checked;render();};
      sec.appendChild(row);
    });
    list.appendChild(sec);
  });
  const pct=mTot?Math.round(mDone/mTot*100):0;
  document.getElementById("pPct").textContent=pct+"%";
  document.getElementById("pCount").textContent=`${mDone} / ${mTot} mandatory`;
  document.getElementById("pFill").style.width=pct+"%";
}

/* ---- JIRA export ---- */
function buildExport(fmt){
  const secs=visibleSections().map(s=>({name:s.name,items:s.items.filter(itemVisible)})).filter(s=>s.items.length);
  const techNames=visibleSections().filter(s=>!s.always).map(s=>s.name).join(", ")||"core only";
  const L=[];
  if(fmt==="md"){
    L.push(`**Definition of Done — ${techNames}**`,"");
    secs.forEach(s=>{ L.push(`### ${s.name}`); s.items.forEach(it=>L.push(`- [ ] ${it.t}${it.m?"":"  _(optional)_"}`)); L.push(""); });
  } else if(fmt==="smart"){
    secs.forEach(s=>{ L.push(`# ${s.name}`); s.items.forEach(it=>L.push(`- ${it.t}${it.m?" (mandatory)":""}`)); L.push(""); });
  } else { // wiki
    L.push(`*Definition of Done — ${techNames}*`,"");
    secs.forEach(s=>{ L.push(`h3. ${s.name}`); s.items.forEach(it=>L.push(`* (x) ${it.t}${it.m?" _(mandatory)_":""}`)); L.push(""); });
  }
  return L.join("\n");
}

const modal=document.getElementById("modal");
const out=document.getElementById("out");
const fmtSel=document.getElementById("fmt");
function refreshOut(){ out.value=buildExport(fmtSel.value); }
document.getElementById("copyBtn").onclick=()=>{ refreshOut(); modal.classList.add("open"); };
fmtSel.onchange=refreshOut;
document.getElementById("closeModal").onclick=()=>modal.classList.remove("open");
modal.onclick=e=>{ if(e.target===modal) modal.classList.remove("open"); };
document.getElementById("copyOut").onclick=async()=>{
  try{ await navigator.clipboard.writeText(out.value); }catch(e){ out.select(); document.execCommand("copy"); }
  toast("Copied to clipboard");
};
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

render();
</script>
